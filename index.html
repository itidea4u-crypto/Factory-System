<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบจัดการงานผลิต</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23EF5B0C'/%3E%3Ctext x='50' y='68' font-family='Arial Black' font-size='48' font-weight='900' text-anchor='middle' fill='white'%3EQC%3C/text%3E%3C/svg%3E">
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Kanit:wght@400;500;600;700;800&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #F4EFD9;
      font-family: 'Sarabun', sans-serif;
      color: #1A1A1A;
      position: relative;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, #E4DEB8 1.2px, transparent 1.2px);
      background-size: 32px 32px;
      opacity: 0.5;
      pointer-events: none;
      z-index: 0;
    }
    .container {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }
    .welcome-header {
      text-align: center;
      margin-bottom: 16px;
      animation: fadeSlide 0.6s ease-out;
    }
    .welcome-title {
      font-family: 'Archivo Black', sans-serif;
      font-size: clamp(56px, 11vw, 128px);
      color: #EF5B0C;
      letter-spacing: clamp(4px, 1.2vw, 14px);
      line-height: 1;
      text-shadow: 0 4px 0 rgba(239, 91, 12, 0.12);
    }
    .subtitle {
      font-family: 'Kanit', sans-serif;
      font-size: clamp(14px, 2vw, 18px);
      color: #1A1A1A;
      margin-top: 12px;
      letter-spacing: 0.05em;
      font-weight: 400;
    }
    .tiles-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: clamp(20px, 4vw, 48px);
      max-width: 900px;
      margin: 60px auto 0;
      padding: 0 12px;
    }
    .tile-cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      opacity: 0;
      animation: tilePop 0.5s ease-out forwards;
    }
    .tile-cell:nth-child(1) { animation-delay: 0.1s; }
    .tile-cell:nth-child(2) { animation-delay: 0.16s; }
    .tile-cell:nth-child(3) { animation-delay: 0.22s; }
    .tile-cell:nth-child(4) { animation-delay: 0.28s; }
    .tile-cell:nth-child(5) { animation-delay: 0.34s; }
    .tile-cell:nth-child(6) { animation-delay: 0.40s; }
    .tile {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: #F6CE3D;
      border: none;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      box-shadow: 0 6px 0 rgba(26, 26, 26, 0.12);
      position: relative;
      text-decoration: none;
      color: #1A1A1A;
    }
    .tile.inactive {
      opacity: 0.55;
      box-shadow: 0 4px 0 rgba(26, 26, 26, 0.06);
      cursor: default;
    }
    .tile.active:hover {
      background: #F0C11E;
      transform: translateY(-4px);
      box-shadow: 0 10px 0 rgba(26, 26, 26, 0.15), 0 14px 24px rgba(0,0,0,0.08);
    }
    .tile.active:hover .hover-hint { opacity: 1; }
    .tile svg {
      width: 44px;
      height: 44px;
      stroke: #1A1A1A;
      stroke-width: 1.6;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .tile.inactive svg { opacity: 0.4; }
    .hover-hint {
      position: absolute;
      bottom: 12px;
      right: 14px;
      font-family: 'Kanit', sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: #1A1A1A;
      letter-spacing: 0.05em;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .tile-label {
      font-family: 'Kanit', sans-serif;
      font-weight: 600;
      font-size: clamp(13px, 1.6vw, 16px);
      text-align: center;
      line-height: 1.3;
      min-height: 40px;
    }
    .tile-label.inactive {
      color: #8A8278;
      font-weight: 400;
      font-size: 0.85em;
    }
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(-12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes tilePop {
      from { opacity: 0; transform: translateY(16px) scale(0.94); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="welcome-header">
      <h1 class="welcome-title">WELCOME</h1>
      <p class="subtitle">เลือกระบบที่ต้องการใช้งาน</p>
    </div>
    <div class="tiles-grid">
      <!-- 1. QC -->
      <div class="tile-cell">
        <a href="qc.html" class="tile active">
          <svg viewBox="0 0 24 24">
            <rect width="8" height="4" x="8" y="2" rx="1" ry="1"/>
            <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
            <path d="m9 14 2 2 4-4"/>
          </svg>
          <span class="hover-hint">เปิด →</span>
        </a>
        <div class="tile-label">ระบบตรวจสอบคุณภาพงานผลิต</div>
      </div>

      <!-- 2. Job Order -->
      <div class="tile-cell">
        <a href="jobs.html" class="tile active">
          <svg viewBox="0 0 24 24">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
            <polyline points="10 9 9 9 8 9"/>
          </svg>
          <span class="hover-hint">เปิด →</span>
        </a>
        <div class="tile-label">ระบบใบงานช่าง</div>
      </div>

      <!-- 3. Stock (coming soon) -->
      <div class="tile-cell">
        <div class="tile inactive">
          <svg viewBox="0 0 24 24">
            <path d="M16.5 9.4 7.55 4.24"/>
            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
            <path d="m3.3 7 8.7 5 8.7-5"/>
            <path d="M12 22V12"/>
          </svg>
        </div>
        <div class="tile-label">ระบบสต๊อกของ</div>
      </div>

      <!-- 4. ระบบเบิกเงินสดย่อย -->
      <div class="tile-cell">
        <a href="petty-cash.html" class="tile active">
          <svg viewBox="0 0 24 24">
            <path d="M19 7V4a1 1 0 0 0-1-1H5a2 2 0 0 0 0 4h15a1 1 0 0 1 1 1v4h-3a2 2 0 0 0 0 4h3a1 1 0 0 0 1-1v-2a1 1 0 0 0-1-1"/>
            <path d="M3 5v14a2 2 0 0 0 2 2h15a1 1 0 0 0 1-1v-4"/>
          </svg>
          <span class="hover-hint">เปิด →</span>
        </a>
        <div class="tile-label">ระบบเบิกเงินสดย่อย</div>
      </div>

      <!-- 5. ระบบยอดขายกลาง -->
      <div class="tile-cell">
        <a href="sales.html" class="tile active">
          <svg viewBox="0 0 24 24">
            <path d="M3 3v18h18"/>
            <path d="M7 16v-7"/>
            <path d="M12 16v-4"/>
            <path d="M17 16v-10"/>
          </svg>
          <span class="hover-hint">เปิด →</span>
        </a>
        <div class="tile-label">ระบบยอดขายกลาง</div>
      </div>

      <!-- 6. coming soon -->
      <div class="tile-cell">
        <div class="tile inactive"></div>
        <div class="tile-label inactive">เร็วๆ นี้</div>
      </div>
    </div>
  </div>
</body>
</html>
