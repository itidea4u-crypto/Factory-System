<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบใบงานช่าง</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%232D5016'/%3E%3Ctext x='50' y='68' font-family='Arial Black' font-size='40' font-weight='900' text-anchor='middle' fill='white'%3EJOB%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Kanit:wght@400;500;600;700;800&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.2/Sortable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #F5F3EE; font-family: 'Sarabun', sans-serif; color: #1A1A1A; min-height: 100vh; }

/* Header */
.app-header {
  background: #2D5016; color: #FFF;
  padding: 16px 20px;
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px;
}
.app-header-left { display: flex; align-items: center; gap: 12px; }
.home-btn {
  width: 36px; height: 36px;
  background: rgba(255,255,255,0.15); border: none;
  border-radius: 8px; color: #FFF; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  text-decoration: none; font-size: 18px;
}
.home-btn:hover { background: rgba(255,255,255,0.25); }
.app-title { font-family: 'Kanit', sans-serif; font-size: 18px; font-weight: 700; }
.app-subtitle { font-size: 12px; opacity: 0.7; margin-top: 1px; }
.btn-reset {
  background: rgba(255,255,255,0.15); border: 1.5px solid rgba(255,255,255,0.4);
  color: #FFF; padding: 8px 14px;
  font-family: 'Kanit', sans-serif; font-size: 13px; font-weight: 500;
  cursor: pointer; border-radius: 4px;
  display: flex; align-items: center; gap: 6px;
  white-space: nowrap;
}
.btn-reset:hover { background: rgba(255,255,255,0.25); }

/* Main */
.main { max-width: 860px; margin: 0 auto; padding: 20px 16px 60px; }
.section { background: #FFF; border: 1px solid #E5E0D5; padding: 20px; margin-bottom: 16px; }
.section-title {
  font-family: 'Kanit', sans-serif; font-size: 17px; font-weight: 600;
  margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
}
.section-num {
  width: 26px; height: 26px; background: #2D5016; color: #FFF;
  border-radius: 50%; font-size: 13px; font-weight: 700;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}

/* Pill group */
.pill-group {
  display: inline-flex; background: #F5F3EE;
  padding: 3px; gap: 3px; border-radius: 6px; width: 100%;
}
.pill-btn {
  flex: 1; background: transparent; border: none;
  padding: 10px 16px;
  font-family: 'Kanit', sans-serif; font-size: 15px; font-weight: 500;
  color: #5A5550; cursor: pointer; transition: all 0.15s; border-radius: 4px;
}
.pill-btn.active { background: #2D5016; color: #FFF; }

/* Fields */
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 14px; }
@media (max-width: 500px) { .field-row { grid-template-columns: 1fr; } }
.field-label { font-size: 12px; font-weight: 600; color: #5A5550; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; display: block; }
.field-select, .field-input {
  width: 100%; padding: 10px 12px;
  border: 1.5px solid #D6D1C7; background: #FFF;
  font-size: 15px; color: #1A1A1A; font-family: inherit;
}
.field-select:focus, .field-input:focus { outline: 2px solid #2D5016; outline-offset: 1px; }

/* Upload */
.upload-btn {
  display: block; width: 100%; padding: 22px 16px;
  background: #FFF; border: 2px dashed #8A8278;
  text-align: center; cursor: pointer; transition: all 0.15s;
  font-family: inherit;
}
.upload-btn:hover { border-color: #2D5016; background: #F0F5E8; }
.upload-btn-icon { font-size: 36px; margin-bottom: 6px; }
.upload-btn-text { font-family: 'Kanit', sans-serif; font-size: 16px; font-weight: 600; color: #1A1A1A; }
.upload-btn-hint { font-size: 13px; color: #8A8278; margin-top: 3px; }

/* Status */
.status-box { padding: 10px 14px; font-size: 13px; margin-bottom: 12px; }
.status-box.info { background: #F4EFD9; border-left: 3px solid #2D5016; color: #5A5550; }
.status-box.warn { background: #FFE8D6; border-left: 3px solid #C1440E; color: #C1440E; }
.status-box.success { background: #E8F5E9; border-left: 3px solid #2D5016; color: #2D5016; }

/* Job list */
.job-list { display: grid; gap: 10px; margin-top: 12px; }
.job-item {
  background: #FFF; border: 1.5px solid #E5E0D5; padding: 12px;
  display: grid; grid-template-columns: auto auto 1fr auto;
  gap: 12px; align-items: start;
}
.job-item:hover { border-color: #2D5016; }
.drag-handle { cursor: grab; color: #8A8278; font-size: 20px; padding: 4px 2px; user-select: none; line-height: 1; }
.drag-handle:active { cursor: grabbing; }
.job-thumb { width: 90px; height: 90px; object-fit: cover; border: 1px solid #E5E0D5; background: #F5F3EE; }
.job-fields { min-width: 0; }
.job-num { font-family: 'Kanit', sans-serif; font-weight: 600; font-size: 15px; margin-bottom: 6px; }
.job-num .badge { font-size: 11px; padding: 2px 7px; margin-left: 6px; font-family: 'Sarabun', sans-serif; font-weight: 500; }
.badge-new { background: #C1440E; color: #FFF; }
.badge-saved { background: #2D5016; color: #FFF; }
.job-input { width: 100%; padding: 6px 10px; border: 1.5px solid #D6D1C7; font-size: 13px; font-family: inherit; margin-top: 6px; }
.job-input:focus { outline: 2px solid #2D5016; outline-offset: 1px; }
.job-remove {
  background: transparent; border: 1.5px solid #C1440E; color: #C1440E;
  width: 30px; height: 30px; cursor: pointer; font-size: 16px;
  display: flex; align-items: center; justify-content: center;
}
.job-remove:hover { background: #C1440E; color: #FFF; }

/* Action buttons */
.action-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 4px; }
.btn-save {
  background: #1A1A1A; color: #FFF; border: none;
  padding: 12px 24px; font-family: 'Kanit', sans-serif;
  font-size: 15px; font-weight: 600; cursor: pointer;
  display: flex; align-items: center; gap: 8px; flex: 1;
  justify-content: center; min-width: 140px;
}
.btn-save:hover { background: #2D5016; }
.btn-save:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-export {
  background: #C1440E; color: #FFF; border: none;
  padding: 12px 24px; font-family: 'Kanit', sans-serif;
  font-size: 15px; font-weight: 600; cursor: pointer;
  display: flex; align-items: center; gap: 8px; flex: 1;
  justify-content: center; min-width: 140px;
}
.btn-export:hover { background: #1A1A1A; }
.btn-export:disabled { opacity: 0.5; cursor: not-allowed; }

/* Print preview */
.preview-section { display: none; }
.preview-section.show { display: block; }
.preview-header {
  display: flex; justify-content: space-between; align-items: center;
  flex-wrap: wrap; gap: 8px; margin-bottom: 12px;
}
.preview-title { font-family: 'Kanit', sans-serif; font-weight: 600; font-size: 16px; }
.preview-stats { font-size: 13px; color: #8A8278; }

/* Print page */
.print-page {
  background: #FFF; border: 1px solid #E5E0D5;
  margin-bottom: 12px; padding: 10mm 12mm;
  width: 100%; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}
.print-page-header { text-align: center; border-bottom: 2px solid #1A1A1A; padding-bottom: 8px; margin-bottom: 10px; }
.print-title { font-family: 'Kanit', sans-serif; font-weight: 700; font-size: 20px; }
.print-meta { font-family: 'Kanit', sans-serif; font-size: 14px; margin-top: 2px; }
.print-grid { display: grid; gap: 6px; }
.print-grid.cols-2 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; height: 200mm; }
.print-grid.cols-2-3 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr 1fr; height: 200mm; }

/* Production cell */
.print-cell-production {
  border: 1px solid #D6D1C7; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  background: #FAFAF7; min-height: 0;
}
.print-cell-production img { width: 100%; height: 100%; object-fit: contain; }
.print-cell-empty { background: #F5F3EE; width: 100%; height: 100%; }

/* Installation cell */
.print-cell-install {
  border: 1px solid #D6D1C7; padding: 5px 6px;
  display: grid; grid-template-columns: auto 1fr;
  grid-template-rows: 1fr auto; gap: 4px;
  min-height: 0; overflow: hidden;
}
.print-cell-num {
  font-family: 'Archivo Black', sans-serif; font-size: 26px;
  line-height: 1; color: #1A1A1A;
  padding-right: 5px; align-self: start;
  grid-row: 1; grid-column: 1;
}
.print-cell-img-wrap {
  grid-row: 1; grid-column: 2; min-height: 0;
  display: flex; align-items: center; justify-content: center; overflow: hidden;
}
.print-cell-img-wrap img { width: 100%; height: 100%; object-fit: contain; }
.print-cell-img-wrap .empty-cell { background: #F5F3EE; width: 100%; height: 100%; }
.print-field-area { grid-row: 2; grid-column: 1 / -1; display: grid; gap: 3px; }
.print-field-row {
  display: flex; align-items: baseline; gap: 4px;
  font-family: 'Sarabun', sans-serif; font-size: 10px; color: #1A1A1A;
}
.print-field-label { white-space: nowrap; font-weight: 600; }
.print-field-line {
  flex: 1; border-bottom: 1px solid #1A1A1A;
  min-width: 0; height: 14px; padding-left: 4px;
  font-size: 10px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
}

/* Toast */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: #1A1A1A; color: #FFF; padding: 12px 20px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.15); z-index: 100;
  font-weight: 500; display: none; border-radius: 4px; white-space: nowrap;
}
.toast.show { display: block; }
.toast.ok { background: #2D5016; }
.toast.error { background: #C1440E; }

/* Loading */
.loading-overlay {
  position: fixed; inset: 0; background: rgba(245,243,238,0.88);
  z-index: 60; display: none; align-items: center; justify-content: center;
}
.loading-overlay.show { display: flex; }
.loading-box { background: #FFF; padding: 22px 32px; font-family: 'Kanit', sans-serif; font-weight: 500; box-shadow: 0 8px 24px rgba(0,0,0,0.12); }

/* Role Tabs */
.role-tabs {
  background: #FFF; border-bottom: 1px solid #D6D1C7;
  display: flex; overflow-x: auto;
}
.role-tab {
  padding: 14px 24px; background: transparent; border: none;
  font-family: 'Kanit', sans-serif; font-weight: 500; font-size: 15px;
  color: #5A5550; cursor: pointer; position: relative; white-space: nowrap;
}
.role-tab.active { color: #1A1A1A; }
.role-tab.active::after {
  content: ''; position: absolute;
  bottom: 0; left: 20px; right: 20px;
  height: 3px; background: #2D5016;
}
.role-tab:first-child.active::after { background: #2D5016; }
.role-tab:last-child.active::after { background: #C1440E; }
.tab-page { display: none; }
.tab-page.active { display: block; }

/* Summary */
.summary-total-card {
  background: #FFF; border: 2px solid #1A1A1A;
  padding: 20px; margin-bottom: 12px;
  display: flex; justify-content: space-between;
  align-items: center; flex-wrap: wrap; gap: 12px;
}
.summary-date-label { font-family: 'Kanit', sans-serif; font-size: 20px; font-weight: 700; }
.summary-total-num { font-family: 'Kanit', sans-serif; font-size: 40px; font-weight: 800; color: #C1440E; line-height: 1; }
.summary-total-hint { font-size: 13px; color: #8A8278; }
.summary-section-label {
  font-family: 'Kanit', sans-serif; font-weight: 600; font-size: 17px;
  margin: 16px 0 8px; display: flex; align-items: center; gap: 8px;
}
.summary-card { background: #FFF; border: 1px solid #E5E0D5; padding: 18px; margin-bottom: 10px; }
.summary-card-header {
  display: flex; justify-content: space-between; align-items: baseline;
  padding-bottom: 10px; margin-bottom: 10px;
  border-bottom: 1px solid #E5E0D5; flex-wrap: wrap; gap: 8px;
}
.summary-team-name {
  font-family: 'Kanit', sans-serif; font-weight: 600; font-size: 16px;
  display: flex; align-items: center; gap: 8px;
}
.badge-type { font-size: 11px; padding: 2px 8px; color: #FFF; font-weight: 500; }
.badge-prod { background: #2D5016; }
.badge-inst { background: #C1440E; }
.summary-team-count { font-family: 'Kanit', sans-serif; font-weight: 700; font-size: 20px; color: #C1440E; }
.thumb-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; }
.thumb-cell { position: relative; aspect-ratio: 1; border: 1px solid #E5E0D5; overflow: hidden; }
.thumb-cell img { width: 100%; height: 100%; object-fit: cover; }
.thumb-loc {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: rgba(0,0,0,0.7); color: #FFF;
  padding: 3px 6px; font-size: 11px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.summary-controls {
  background: #FFF; border: 1px solid #E5E0D5;
  padding: 16px 20px; margin-bottom: 16px;
  display: flex; align-items: flex-end; gap: 12px; flex-wrap: wrap;
}
.btn-summary-load {
  background: #1A1A1A; color: #FFF; border: none;
  padding: 10px 20px; font-family: 'Kanit', sans-serif;
  font-size: 14px; font-weight: 600; cursor: pointer;
  display: flex; align-items: center; gap: 6px;
}
.btn-summary-load:hover { background: #C1440E; }
.btn-summary-export {
  background: #C1440E; color: #FFF; border: none;
  padding: 10px 20px; font-family: 'Kanit', sans-serif;
  font-size: 14px; font-weight: 600; cursor: pointer;
  display: flex; align-items: center; gap: 6px;
}
.btn-summary-export:hover { background: #1A1A1A; }
.btn-summary-export:disabled { opacity: 0.5; cursor: not-allowed; }

/* Header for summary tab — hide reset button */
.header-upload-only { display: flex; }
.header-summary-only { display: none; }

/* Header color changes by active tab */
.header-summary .app-header { background: #C1440E; }

.hidden { display: none !important; }
#jobItemsContainer:empty, #saveRow:empty { display: none; }

/* Print media */
@media print {
  @page { size: A4 portrait; margin: 8mm; }
  body { background: #FFF; }
  .app-header, .section:not(.preview-section), .toast, .loading-overlay { display: none !important; }
  .main { padding: 0; max-width: none; }
  .preview-section { display: block !important; }
  .preview-header { display: none !important; }
  .print-page { box-shadow: none; border: none; padding: 0; margin: 0; page-break-after: always; }
  .print-page:last-child { page-break-after: auto; }
  .print-grid.cols-2, .print-grid.cols-2-3 { height: calc(297mm - 44mm); }
  .print-cell-production, .print-cell-install { border: 1px solid #999; }
}
</style>
</head>
<body>

<div id="appWrapper">

<div class="app-header" id="appHeader">
  <div class="app-header-left">
    <a href="index.html" class="home-btn" title="กลับหน้าหลัก">🏠</a>
    <div>
      <div class="app-title" id="appTitle">ใบงานช่าง</div>
      <div class="app-subtitle" id="appSubtitle">อัปโหลดใบงาน</div>
    </div>
  </div>
  <button class="btn-reset" id="btnReset" onclick="confirmReset()">🗑️ เริ่มงานใหม่</button>
</div>

<!-- Role Tabs -->
<div class="role-tabs">
  <button class="role-tab active" data-role="upload" onclick="switchRole('upload')">📎 หัวหน้าช่าง</button>
  <button class="role-tab" data-role="summary" onclick="switchRole('summary')">📊 สรุปงาน (พี่แคท)</button>
</div>

<!-- ========== TAB: UPLOAD ========== -->
<div class="tab-page active" id="page-upload">
<div class="main">

  <!-- ① เลือกทีม/ประเภท/วันที่ -->
  <div class="section">
    <div class="section-title"><span class="section-num">1</span>เลือกประเภทและทีมช่าง</div>
    <label class="field-label">ประเภทงาน</label>
    <div class="pill-group">
      <button class="pill-btn active" data-wt="production" onclick="selectWorkType('production')">🔨 ผลิต</button>
      <button class="pill-btn" data-wt="installation" onclick="selectWorkType('installation')">🛠️ ติดตั้ง</button>
    </div>
    <div class="field-row">
      <div>
        <label class="field-label">ทีมช่าง</label>
        <select class="field-select" id="teamSelect" onchange="onTeamDateChange()"></select>
      </div>
      <div>
        <label class="field-label">วันที่</label>
        <input type="date" class="field-input" id="jobDate" onchange="onTeamDateChange()">
      </div>
    </div>
  </div>

  <!-- ② แนบรูป -->
  <div class="section">
    <div class="section-title"><span class="section-num">2</span>แนบรูปใบงาน</div>

    <div id="existingStatus"></div>

    <label class="upload-btn" for="fileInput">
      <div class="upload-btn-icon">📎</div>
      <div class="upload-btn-text">กดเพื่อเลือกรูป</div>
      <div class="upload-btn-hint">เลือกได้หลายรูปพร้อมกัน · JPG / PNG</div>
      <input type="file" id="fileInput" accept="image/*" multiple style="display:none" onchange="handleFiles(event.target.files)">
    </label>

    <div id="jobItemsContainer"></div>

    <div id="saveRow"></div>
  </div>

  <!-- ③ ตัวอย่าง + Export -->
  <div class="section preview-section" id="previewSection">
    <div class="preview-header">
      <div>
        <div class="preview-title">③ ตัวอย่างใบงาน</div>
        <div class="preview-stats" id="previewStats"></div>
      </div>
    </div>
    <div id="printPagesContainer"></div>
    <div class="action-row" style="margin-top:14px;">
      <button class="btn-export" id="exportBtn" onclick="exportAllPages()">📸 บันทึกเป็นรูป</button>
    </div>
  </div>

</div><!-- end .main upload -->
</div><!-- end #page-upload -->

<!-- ========== TAB: SUMMARY ========== -->
<div class="tab-page" id="page-summary">
<div class="main">

  <div class="summary-controls">
    <div>
      <label class="field-label">วันที่</label>
      <input type="date" class="field-input" id="summaryDate">
    </div>
    <button class="btn-summary-load" onclick="loadSummary()">🔍 ดูสรุป</button>
    <button class="btn-summary-export" id="exportSummaryBtn" onclick="exportSummaryPNG()" disabled>📸 Export PNG</button>
  </div>

  <div id="summaryContainer"></div>

</div><!-- end .main summary -->
</div><!-- end #page-summary -->

</div><!-- end #appWrapper -->

<div class="toast" id="toast"></div>
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-box" id="loadingText">กำลังโหลด...</div>
</div>

<script>
// ============================================================================
//  CONFIG
// ============================================================================
const API_URL = 'https://script.google.com/macros/s/AKfycbxjD9VZQyVHQNfvCvjahxpF83896Hibc8UmMa_VjFmkY-sbiZjFnq4z8rLapzPTB_SU/exec';

const TEAMS = {
  production: ['พี่ชาติ/พี่พง/แมน', 'นอท/โต', 'เล็กซอยตัน/หลา'],
  installation: ['กุ่ง/เล็ก/เล', 'พี่วัด/อาว/เล็ก'],
};

const THAI_MONTHS_FULL = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];

// ============================================================================
//  STATE
// ============================================================================
let workType = 'production';
let jobItems = [];
let sortableInst = null;

// ============================================================================
//  UTILS
// ============================================================================
function todayISO() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function esc(s) {
  return String(s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso+'T00:00:00');
  return d.getDate() + ' ' + THAI_MONTHS_FULL[d.getMonth()] + ' ' + (d.getFullYear()+543);
}
function fmtDateShort(iso) {
  if (!iso) return '';
  const [y, m, d] = iso.split('-');
  return d + '/' + m + '/' + String(Number(y)+543).slice(-2);
}
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + (type||'');
  clearTimeout(t._tid);
  t._tid = setTimeout(() => t.classList.remove('show'), 3000);
}
function showLoading(msg) {
  document.getElementById('loadingText').textContent = msg || 'กำลังโหลด...';
  document.getElementById('loadingOverlay').classList.add('show');
}
function hideLoading() { document.getElementById('loadingOverlay').classList.remove('show'); }

function resizeImage(file, maxDim, q) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = e => {
      const img = new Image();
      img.onload = () => {
        let {width: w, height: h} = img;
        if (Math.max(w,h) > maxDim) {
          if (w > h) { h = h*(maxDim/w); w = maxDim; }
          else { w = w*(maxDim/h); h = maxDim; }
        }
        const c = document.createElement('canvas');
        c.width = w; c.height = h;
        c.getContext('2d').drawImage(img, 0, 0, w, h);
        res(c.toDataURL('image/jpeg', q));
      };
      img.onerror = rej;
      img.src = e.target.result;
    };
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

// ============================================================================
//  API
// ============================================================================
async function apiCall(body) {
  const res = await fetch(API_URL, {
    method: 'POST',
    headers: {'Content-Type': 'text/plain;charset=utf-8'},
    body: JSON.stringify(body),
  });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const json = await res.json();
  if (json.error) throw new Error(json.error);
  return json;
}

// ============================================================================
//  TEAM / DATE SELECTORS
// ============================================================================
function selectWorkType(wt) {
  workType = wt;
  document.querySelectorAll('[data-wt]').forEach(b => b.classList.toggle('active', b.dataset.wt === wt));
  populateTeams();
  onTeamDateChange();
}

function populateTeams() {
  const sel = document.getElementById('teamSelect');
  sel.innerHTML = TEAMS[workType].map(t => `<option value="${esc(t)}">${esc(t)}</option>`).join('');
}

function onTeamDateChange() {
  // Reset local job list + reload existing
  jobItems = [];
  renderJobItems();
  loadExisting();
}

async function loadExisting() {
  const status = document.getElementById('existingStatus');
  const team = document.getElementById('teamSelect').value;
  const date = document.getElementById('jobDate').value;
  if (!team || !date) { status.innerHTML = ''; return; }

  status.innerHTML = '<div class="status-box info">⏳ กำลังโหลดข้อมูลเดิม...</div>';
  try {
    const res = await Promise.race([
      apiCall({action:'job_list', workType, team, date}),
      new Promise((_,r) => setTimeout(() => r(new Error('หมดเวลา — กรุณาลองใหม่')), 12000)),
    ]);
    const existing = (res.jobs||[]).map(j => ({
      id: j.id, imageUrl: j.imageUrl,
      location: j.location||'', note: j.note||'', isNew: false,
    }));
    jobItems = existing;
    if (existing.length === 0) {
      status.innerHTML = '<div class="status-box info">📂 ยังไม่มีใบงานของ <strong>' + esc(team) + '</strong> วันนี้ — กดเลือกรูปด้านล่าง</div>';
    } else {
      status.innerHTML = '<div class="status-box success">📂 มีใบงานที่บันทึกไว้ <strong>' + existing.length + ' ใบ</strong> — เพิ่มหรือแก้ไขได้เลย</div>';
    }
    renderJobItems();
  } catch (err) {
    status.innerHTML = '<div class="status-box warn">⚠️ ' + esc(err.message) +
      ' <button onclick="loadExisting()" style="margin-left:8px;padding:4px 10px;cursor:pointer;font-size:12px;">🔄 ลองใหม่</button></div>';
  }
}

// ============================================================================
//  FILE UPLOAD
// ============================================================================
async function handleFiles(files) {
  if (!files || !files.length) return;
  showLoading('กำลังประมวลผล ' + files.length + ' รูป...');
  try {
    for (const f of files) {
      if (!f.type.startsWith('image/')) continue;
      const data = await resizeImage(f, 1400, 0.82);
      jobItems.push({ tempId: uid(), imageData: data, location: '', note: '', isNew: true });
    }
    renderJobItems();
    document.getElementById('fileInput').value = '';
  } catch (e) { showToast('ประมวลผลรูปไม่สำเร็จ', 'error'); }
  finally { hideLoading(); }
}

// ============================================================================
//  RENDER JOB LIST
// ============================================================================
function renderJobItems() {
  const container = document.getElementById('jobItemsContainer');
  const saveRow = document.getElementById('saveRow');
  const previewSection = document.getElementById('previewSection');

  if (jobItems.length === 0) {
    container.innerHTML = '';
    saveRow.innerHTML = '';
    previewSection.classList.remove('show');
    document.getElementById('printPagesContainer').innerHTML = '';
    return;
  }

  const isInstall = workType === 'installation';
  const newCount = jobItems.filter(j => j.isNew).length;

  let html = '<div class="job-list" id="jobList">';
  html += jobItems.map((item, idx) => {
    const key = item.id || item.tempId;
    const imgSrc = item.imageData || item.imageUrl || '';
    const badgeCls = item.isNew ? 'badge-new' : 'badge-saved';
    const badgeText = item.isNew ? 'ใหม่' : 'บันทึกแล้ว';
    return '<div class="job-item" data-key="' + key + '">' +
      '<div class="drag-handle">⋮⋮</div>' +
      '<img class="job-thumb" src="' + esc(imgSrc) + '" referrerpolicy="no-referrer" onerror="this.style.background=\'#F5F3EE\'">' +
      '<div class="job-fields">' +
        '<div class="job-num">ใบที่ ' + (idx+1) + ' <span class="badge ' + badgeCls + '">' + badgeText + '</span></div>' +
        (isInstall
          ? '<input class="job-input" placeholder="📍 สถานที่ (ไม่บังคับ)" value="' + esc(item.location) + '" oninput="updateField(\'' + key + '\',\'location\',this.value)">' +
            '<input class="job-input" placeholder="📝 หมายเหตุ (ไม่บังคับ)" value="' + esc(item.note) + '" oninput="updateField(\'' + key + '\',\'note\',this.value)">'
          : '') +
      '</div>' +
      '<button class="job-remove" onclick="removeItem(\'' + key + '\')">×</button>' +
    '</div>';
  }).join('');
  html += '</div>';
  container.innerHTML = html;

  // Sortable
  if (sortableInst) sortableInst.destroy();
  sortableInst = Sortable.create(document.getElementById('jobList'), {
    handle: '.drag-handle', animation: 150,
    onEnd: () => {
      const order = Array.from(document.getElementById('jobList').children).map(el => el.dataset.key);
      jobItems.sort((a,b) => order.indexOf(a.id||a.tempId) - order.indexOf(b.id||b.tempId));
      renderJobItems();
    },
  });

  // Save button
  const label = newCount === 0 ? '💾 บันทึกการแก้ไข'
    : jobItems.length === newCount ? '💾 บันทึก ' + newCount + ' ใบ'
    : '💾 บันทึก (เพิ่ม ' + newCount + ' ใบ)';
  saveRow.innerHTML = '<div class="action-row" style="margin-top:4px;"><button class="btn-save" onclick="saveItems()">' + label + '</button></div>';

  // Update preview
  renderPreview();
}

function updateField(key, field, val) {
  const item = jobItems.find(j => (j.id||j.tempId) === key);
  if (item) { item[field] = val; }
  // Debounce preview update
  clearTimeout(window._pvTimer);
  window._pvTimer = setTimeout(renderPreview, 500);
}

async function removeItem(key) {
  const idx = jobItems.findIndex(j => (j.id||j.tempId) === key);
  if (idx === -1) return;
  const item = jobItems[idx];
  if (!item.isNew) {
    if (!confirm('ลบใบงานนี้ออกจากระบบด้วยใช่หรือไม่?')) return;
    showLoading('กำลังลบ...');
    try { await apiCall({action:'job_delete', id: item.id}); }
    catch (e) { showToast('ลบไม่สำเร็จ: ' + e.message, 'error'); hideLoading(); return; }
    finally { hideLoading(); }
  }
  jobItems.splice(idx, 1);
  renderJobItems();
  showToast('ลบเรียบร้อย', 'ok');
}

// ============================================================================
//  SAVE
// ============================================================================
async function saveItems() {
  const team = document.getElementById('teamSelect').value;
  const date = document.getElementById('jobDate').value;
  if (!team || !date) { showToast('กรุณาเลือกทีมและวันที่', 'error'); return; }

  showLoading('กำลังบันทึก...');
  try {
    // Update existing
    for (const item of jobItems.filter(j => !j.isNew)) {
      await apiCall({action:'job_update', id:item.id, payload:{location:item.location, note:item.note}});
    }
    // Create new
    const newItems = jobItems.filter(j => j.isNew);
    if (newItems.length > 0) {
      const res = await apiCall({action:'job_create', payload:{
        workType, team, jobDate: date,
        items: newItems.map(i => ({imageData:i.imageData, location:i.location, note:i.note})),
      }});
      (res.jobs||[]).forEach((sj, idx) => {
        const local = newItems[idx];
        if (local && sj) {
          local.id = sj.id; local.imageUrl = sj.imageUrl;
          delete local.imageData; delete local.tempId; local.isNew = false;
        }
      });
    }
    // Reorder
    const ids = jobItems.filter(j => j.id).map(j => j.id);
    if (ids.length > 0) await apiCall({action:'job_reorder', ids});

    showToast('บันทึกเรียบร้อย ✅', 'ok');
    renderJobItems();
  } catch (e) { showToast('บันทึกไม่สำเร็จ: ' + e.message, 'error'); }
  finally { hideLoading(); }
}

// ============================================================================
//  PREVIEW + EXPORT
// ============================================================================
function renderPreview() {
  const previewSection = document.getElementById('previewSection');
  const container = document.getElementById('printPagesContainer');
  const stats = document.getElementById('previewStats');

  if (jobItems.length === 0) {
    previewSection.classList.remove('show');
    return;
  }
  previewSection.classList.add('show');

  const isInstall = workType === 'installation';
  const perPage = isInstall ? 6 : 4;
  const team = document.getElementById('teamSelect').value;
  const date = document.getElementById('jobDate').value;
  const totalPages = Math.ceil(jobItems.length / perPage);

  stats.textContent = jobItems.length + ' ใบ → ' + totalPages + ' หน้า A4';

  let html = '';
  for (let p = 0; p < totalPages; p++) {
    const start = p * perPage;
    const pageItems = jobItems.slice(start, start + perPage);
    html += buildPage(pageItems, start, isInstall, perPage, team, date, p+1, totalPages);
  }
  container.innerHTML = html;
}

function buildPage(pageItems, start, isInstall, perPage, team, date, pageNum, totalPages) {
  const typeLabel = isInstall ? 'ติดตั้ง' : 'ผลิต';
  const gridClass = isInstall ? 'cols-2-3' : 'cols-2';

  let cells = '';
  for (let i = 0; i < perPage; i++) {
    const item = pageItems[i];
    const numStr = String(start + i + 1).padStart(2, '0');
    const imgSrc = item ? (item.imageData || item.imageUrl || '') : '';

    if (isInstall) {
      const imgPart = imgSrc
        ? '<img src="' + esc(imgSrc) + '" referrerpolicy="no-referrer" onerror="this.style.opacity=0.2">'
        : '<div class="empty-cell"></div>';
      cells += '<div class="print-cell-install">' +
        '<div class="print-cell-num">' + numStr + '</div>' +
        '<div class="print-cell-img-wrap">' + imgPart + '</div>' +
        '<div class="print-field-area">' +
          '<div class="print-field-row"><span class="print-field-label">สถานที่:</span>' +
            '<div class="print-field-line">' + esc(item?.location||'') + '</div></div>' +
          '<div class="print-field-row"><span class="print-field-label">หมายเหตุเพิ่มเติม:</span>' +
            '<div class="print-field-line">' + esc(item?.note||'') + '</div></div>' +
        '</div>' +
      '</div>';
    } else {
      const imgPart = imgSrc
        ? '<img src="' + esc(imgSrc) + '" referrerpolicy="no-referrer" onerror="this.style.opacity=0.2">'
        : '<div class="print-cell-empty"></div>';
      cells += '<div class="print-cell-production">' + imgPart + '</div>';
    }
  }

  return '<div class="print-page" id="printPage_' + (pageNum-1) + '">' +
    '<div class="print-page-header">' +
      '<div class="print-title">ใบงาน' + typeLabel + ' ' + perPage + ' งาน/หน้า</div>' +
      '<div class="print-meta">ทีม' + typeLabel + ': ' + esc(team) + '&nbsp;&nbsp;&nbsp;วันที่: ' + fmtDateShort(date) + '</div>' +
    '</div>' +
    '<div class="print-grid ' + gridClass + '">' + cells + '</div>' +
  '</div>';
}

// Export PNG — 1 file per page
async function exportAllPages() {
  const pages = document.querySelectorAll('[id^="printPage_"]');
  if (!pages.length) return;

  const team = document.getElementById('teamSelect').value;
  const date = document.getElementById('jobDate').value;
  const typeLabel = workType === 'production' ? 'ผลิต' : 'ติดตั้ง';

  showLoading('กำลังสร้างรูป (' + pages.length + ' หน้า)...');
  await new Promise(r => setTimeout(r, 150));
  try {
    for (let i = 0; i < pages.length; i++) {
      const canvas = await html2canvas(pages[i], {
        backgroundColor: '#FFFFFF', scale: 2, useCORS: true, logging: false,
      });
      const dataUrl = canvas.toDataURL('image/png');
      const a = document.createElement('a');
      a.href = dataUrl;
      a.download = 'ใบงาน' + typeLabel + '-' + esc(team) + '-' + fmtDateShort(date) +
        (pages.length > 1 ? '-หน้า' + (i+1) : '') + '.png';
      a.click();
      if (i < pages.length - 1) await new Promise(r => setTimeout(r, 300));
    }
    showToast('บันทึก ' + pages.length + ' รูปเรียบร้อย ✅', 'ok');
  } catch (e) { showToast('สร้างรูปไม่สำเร็จ: ' + e.message, 'error'); }
  finally { hideLoading(); }
}

// ============================================================================
//  RESET
// ============================================================================
function confirmReset() {
  if (!confirm('ล้างข้อมูลทั้งหมดและเริ่มงานใหม่ใช่หรือไม่?\n\n(ข้อมูลที่บันทึกแล้วยังอยู่ใน Google Sheets ไม่ถูกลบ)')) return;
  jobItems = [];
  document.getElementById('teamSelect').selectedIndex = 0;
  document.getElementById('jobDate').value = todayISO();
  document.getElementById('existingStatus').innerHTML = '';
  renderJobItems();
  showToast('ล้างฟอร์มเรียบร้อย', 'ok');
  loadExisting();
}

// ============================================================================
//  ROLE TABS
// ============================================================================
function switchRole(role) {
  document.querySelectorAll('.role-tab').forEach(b => b.classList.toggle('active', b.dataset.role === role));
  document.querySelectorAll('.tab-page').forEach(p => p.classList.toggle('active', p.id === 'page-' + role));

  const header = document.getElementById('appHeader');
  const btnReset = document.getElementById('btnReset');
  const title = document.getElementById('appTitle');
  const subtitle = document.getElementById('appSubtitle');

  if (role === 'upload') {
    header.style.background = '#2D5016';
    btnReset.style.display = 'flex';
    title.textContent = 'ใบงานช่าง';
    subtitle.textContent = 'อัปโหลดใบงาน';
  } else {
    header.style.background = '#C1440E';
    btnReset.style.display = 'none';
    title.textContent = 'สรุปใบงาน';
    subtitle.textContent = 'Job Order Summary';
    // Auto-load summary with today's date
    if (!document.getElementById('summaryDate').value) {
      document.getElementById('summaryDate').value = todayISO();
    }
    loadSummary();
  }
}

// ============================================================================
//  SUMMARY
// ============================================================================
async function loadSummary() {
  const date = document.getElementById('summaryDate').value;
  const container = document.getElementById('summaryContainer');
  document.getElementById('exportSummaryBtn').disabled = true;
  showLoading('กำลังโหลดสรุป...');
  try {
    const res = await apiCall({action: 'job_summary', date});
    renderSummary(res, date);
  } catch (e) {
    container.innerHTML = '<div style="padding:40px;text-align:center;color:#8A8278;font-family:Kanit,sans-serif;font-size:16px;">โหลดไม่สำเร็จ: ' + esc(e.message) + '</div>';
  } finally { hideLoading(); }
}

function renderSummary(data, date) {
  const container = document.getElementById('summaryContainer');
  const groups = data.groups || [];
  const total = data.total || 0;
  document.getElementById('exportSummaryBtn').disabled = total === 0;

  if (total === 0) {
    container.innerHTML = '<div style="padding:60px 20px;text-align:center;color:#8A8278;">' +
      '<div style="font-family:Kanit,sans-serif;font-size:18px;margin-bottom:6px;">ยังไม่มีข้อมูลในวันนี้</div>' +
      '<div>' + fmtDate(date) + '</div></div>';
    return;
  }

  const prodGroups = groups.filter(g => g.workType === 'production');
  const instGroups = groups.filter(g => g.workType === 'installation');

  let html = '<div id="summaryExport">';
  html += '<div class="summary-total-card">' +
    '<div><div class="summary-date-label">' + fmtDate(date) + '</div></div>' +
    '<div style="text-align:right;"><div class="summary-total-num">' + total + '</div>' +
    '<div class="summary-total-hint">งานรวมทั้งหมด</div></div>' +
  '</div>';

  if (prodGroups.length) {
    html += '<div class="summary-section-label">🔨 งานผลิต</div>';
    prodGroups.forEach(g => { html += buildSummaryCard(g, false); });
  }
  if (instGroups.length) {
    html += '<div class="summary-section-label">🛠️ งานติดตั้ง</div>';
    instGroups.forEach(g => { html += buildSummaryCard(g, true); });
  }
  html += '</div>';
  container.innerHTML = html;
}

function buildSummaryCard(g, isInstall) {
  const thumbs = g.jobs.map(j => {
    if (isInstall && j.location) {
      return '<div class="thumb-cell">' +
        '<img src="' + esc(j.imageUrl) + '" referrerpolicy="no-referrer" onerror="this.style.opacity=0.2">' +
        '<div class="thumb-loc">📍 ' + esc(j.location) + '</div></div>';
    }
    return '<div class="thumb-cell"><img src="' + esc(j.imageUrl) + '" referrerpolicy="no-referrer" onerror="this.style.opacity=0.2"></div>';
  }).join('');

  return '<div class="summary-card">' +
    '<div class="summary-card-header">' +
      '<div class="summary-team-name">' +
        '<span class="badge-type ' + (isInstall ? 'badge-inst' : 'badge-prod') + '">' + (isInstall ? 'ติดตั้ง' : 'ผลิต') + '</span>' +
        esc(g.team) +
      '</div>' +
      '<div class="summary-team-count">' + g.count + ' งาน</div>' +
    '</div>' +
    '<div class="thumb-grid">' + thumbs + '</div>' +
  '</div>';
}

async function exportSummaryPNG() {
  const target = document.getElementById('summaryExport');
  if (!target) return;
  const date = document.getElementById('summaryDate').value;
  showLoading('กำลังสร้างรูป...');
  await new Promise(r => setTimeout(r, 150));
  try {
    const canvas = await html2canvas(target, {backgroundColor:'#F5F3EE', scale:2, useCORS:true, logging:false});
    const a = document.createElement('a');
    a.href = canvas.toDataURL('image/png');
    a.download = 'สรุปงาน-' + date + '.png';
    a.click();
    showToast('บันทึกรูปเรียบร้อย ✅', 'ok');
  } catch (e) { showToast('สร้างรูปไม่สำเร็จ: ' + e.message, 'error'); }
  finally { hideLoading(); }
}

populateTeams();
document.getElementById('jobDate').value = todayISO();
document.getElementById('summaryDate').value = todayISO();
loadExisting();
