}

// alias เก่าเพื่อ backward compat
function MediaSummaryCard({ ms }) { return <TeamBreakdownCard ms={ms} kind="media" />; }

// ─── หน้า "สรุปส่งพี่ X" — สำหรับพี่ญสร้างรูปส่ง ───────────────────
function SendToPartnerView({ transactions, onShowImage, onViewAtts }) {
  const [mode, setMode] = useState("day");
  const [date, setDate] = useState(todayStr());
  const [from, setFrom] = useState(() => {
    const d = new Date();
    d.setDate(d.getDate() - 7);
    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
  });
  const [to, setTo] = useState(todayStr());

  const summary = useMemo(() => {
    if (mode === "day") return computeSummary(transactions, t => t.date === date);
    return computeSummary(transactions, t => t.date >= from && t.date <= to);
  }, [transactions, mode, date, from, to]);

  const items = useMemo(() => {
    return [...summary.items].sort((a, b) => {
      if (a.date !== b.date) return b.date.localeCompare(a.date);
      if (a.shift !== b.shift) return a.shift === "เช้า" ? -1 : 1;
      return a.createdAt - b.createdAt;
    });
  }, [summary.items]);

  const breakdown = useMemo(() => {
    let cash = 0, transfer = 0;
    summary.yItems.forEach(t => {
      if (t.paymentMethod === "จ่ายเงินสด") cash += t.amount;
      else if (t.paymentMethod === "โอน/สแกน") transfer += t.amount;
    });
    return { cash, transfer };
  }, [summary]);

  const mediaSummary = useMemo(() => computeMediaSummary(summary.yItems), [summary]);

  const dateLabel = mode === "day"
    ? formatThaiDate(date)
    : `${formatThaiDate(from)} – ${formatThaiDate(to)}`;
  const fileLabel = mode === "day" ? date : `${from}_ถึง_${to}`;

  const handleGenerateImage = async () => {
    const canvas = await renderSummaryImage(summary, dateLabel, mode === "day" ? "สรุปรายวัน" : "สรุปช่วงวันที่");
    onShowImage(canvas, `สรุปยอด_${fileLabel}.png`);
  };

  return (
    <div className="space-y-3">
      <div className="bg-emerald-50 border border-emerald-200 rounded-xl px-3 py-2.5 text-[12px] text-emerald-900 flex items-start gap-2">
        <Send size={14} className="mt-0.5 flex-shrink-0" />
        <span>เลือกวันที่หรือช่วงเวลา ตรวจตัวเลข แล้วกดสร้างรูปเพื่อส่งให้พี่ X ทาง LINE</span>
      </div>

      <div className="bg-white rounded-2xl border border-stone-200 p-3.5 shadow-sm">
        <div className="grid grid-cols-2 gap-1 bg-stone-100 p-1 rounded-lg mb-3">
          <button onClick={() => setMode("day")}
            className={`py-1.5 rounded-md text-[13px] font-medium transition ${
              mode === "day" ? "bg-white text-emerald-700 shadow-sm" : "text-stone-600"
            }`}>
            รายวัน
          </button>
          <button onClick={() => setMode("range")}
            className={`py-1.5 rounded-md text-[13px] font-medium transition ${
              mode === "range" ? "bg-white text-emerald-700 shadow-sm" : "text-stone-600"
            }`}>
            ช่วงวันที่
          </button>
        </div>

        {mode === "day" ? (
          <div>
            <label className="block text-[10.5px] font-medium text-stone-600 mb-1 uppercase tracking-wide">วันที่</label>
            <input type="date" value={date} onChange={e => setDate(e.target.value)}
              className="w-full px-2 py-1.5 border border-stone-300 rounded-lg text-[13px]" />
          </div>
        ) : (
          <div className="grid grid-cols-2 gap-2">
            <div>
              <label className="block text-[10.5px] font-medium text-stone-600 mb-1 uppercase tracking-wide">ตั้งแต่</label>
              <input type="date" value={from} onChange={e => setFrom(e.target.value)}
                className="w-full px-2 py-1.5 border border-stone-300 rounded-lg text-[13px]" />
            </div>
            <div>
              <label className="block text-[10.5px] font-medium text-stone-600 mb-1 uppercase tracking-wide">ถึง</label>
              <input type="date" value={to} onChange={e => setTo(e.target.value)}
                className="w-full px-2 py-1.5 border border-stone-300 rounded-lg text-[13px]" />
            </div>
          </div>
        )}
      </div>

      <div className="bg-white rounded-2xl border border-stone-200 overflow-hidden shadow-sm">
        <div className="bg-gradient-to-br from-emerald-700 to-emerald-800 text-white p-5">
          <p className="text-[11px] opacity-80 font-medium uppercase tracking-wide">{dateLabel}</p>
          <p className="text-[12px] opacity-90 mt-2">ยอดเบิกรวมสุทธิ</p>
          <p className="text-4xl font-bold mt-1">฿{fmt(summary.total)}</p>
          <p className="text-[11px] opacity-80 mt-1">{fmtInt(summary.yCount)} รายการ</p>
        </div>

        <div className="grid grid-cols-2 divide-x divide-stone-200 border-b border-stone-200">
          <div className="p-3.5">
            <p className="text-[11px] text-amber-700 font-medium flex items-center gap-1"><Sun size={11} />รวมรอบเช้า</p>
            <p className="text-lg font-bold text-stone-900 mt-0.5">฿{fmt(summary.morning)}</p>
          </div>
          <div className="p-3.5">
            <p className="text-[11px] text-indigo-700 font-medium flex items-center gap-1"><Moon size={11} />รวมรอบเย็น</p>
            <p className="text-lg font-bold text-stone-900 mt-0.5">฿{fmt(summary.evening)}</p>
          </div>
        </div>

        {(breakdown.cash > 0 || breakdown.transfer > 0) && (
          <div className="px-3.5 py-3 border-b border-stone-200">
            <p className="text-[10.5px] text-stone-500 font-medium uppercase tracking-wide mb-1.5">รายละเอียดการจ่าย</p>
            <div className="space-y-1 text-[12.5px]">
              {breakdown.cash > 0 && (
                <div className="flex justify-between">
                  <span className="text-stone-600">จ่ายเงินสด</span>
                  <span className="font-semibold text-stone-900">฿{fmt(breakdown.cash)}</span>
                </div>
              )}
              {breakdown.transfer > 0 && (
                <div className="flex justify-between">
                  <span className="text-stone-600">โอน/สแกน</span>
                  <span className="font-semibold text-stone-900">฿{fmt(breakdown.transfer)}</span>
                </div>
              )}
            </div>
          </div>
        )}

        {summary.xTotal > 0 && (
          <div className="bg-stone-50 p-3.5 border-b border-stone-200 flex items-center justify-between">
            <div>
              <p className="text-[11px] text-stone-600 font-medium flex items-center gap-1"><User size={11} />พี่ X โอนเอง</p>
              <p className="text-[10px] text-stone-400 mt-0.5">{fmtInt(summary.xCount)} รายการ · ไม่รวมในยอดเบิก</p>
            </div>
            <p className="text-base font-semibold text-stone-700">฿{fmt(summary.xTotal)}</p>
          </div>
        )}

        <div className="p-3.5 flex items-center justify-between">
          <p className="text-[11px] text-stone-500">รวมรายการทั้งหมด</p>
          <p className="text-[13px] font-semibold text-stone-900">{fmtInt(summary.count)} รายการ</p>
        </div>
      </div>

      {(mediaSummary.mediaCount > 0 || mediaSummary.installerCount > 0 || mediaSummary.otCount > 0) && (
        <div className="grid grid-cols-3 gap-2">
          <div className="bg-orange-50 border border-orange-200 rounded-xl p-3">
            <p className="text-[11px] text-orange-700 font-medium">🔧 ช่างติดตั้ง</p>
            <p className="text-base font-bold text-orange-900 mt-0.5">฿{fmt(mediaSummary.installerTotal)}</p>
            <p className="text-[10px] text-orange-600 mt-0.5">{fmtInt(mediaSummary.installerCount)} รายการ</p>
          </div>
          <div className="bg-purple-50 border border-purple-200 rounded-xl p-3">
            <p className="text-[11px] text-purple-700 font-medium">🎥 ทีมมีเดีย</p>
            <p className="text-base font-bold text-purple-900 mt-0.5">฿{fmt(mediaSummary.mediaTotal)}</p>
            <p className="text-[10px] text-purple-600 mt-0.5">{fmtInt(mediaSummary.mediaCount)} รายการ</p>
          </div>
          <div className="bg-rose-50 border border-rose-200 rounded-xl p-3">
            <p className="text-[11px] text-rose-700 font-medium">⏰ OT</p>
            <p className="text-base font-bold text-rose-900 mt-0.5">฿{fmt(mediaSummary.otTotal)}</p>
            <p className="text-[10px] text-rose-600 mt-0.5">{fmtInt(mediaSummary.otCount)} รายการ</p>
          </div>
        </div>
      )}

      {mediaSummary.installerCount > 0 && <TeamBreakdownCard ms={mediaSummary} kind="installer" />}
      {mediaSummary.mediaCount > 0 && <TeamBreakdownCard ms={mediaSummary} kind="media" />}
      {mediaSummary.otCount > 0 && <OTSummaryCard ms={mediaSummary} /> }

      <button
        onClick={handleGenerateImage}
        disabled={summary.count === 0}
        className="w-full bg-stone-900 hover:bg-stone-800 disabled:bg-stone-300 disabled:cursor-not-allowed text-white py-3 rounded-2xl font-semibold text-sm flex items-center justify-center gap-2 shadow-sm"
      >
        <ImageIcon size={16} />สร้างรูปสรุปส่งพี่ X
      </button>

      {items.length > 0 ? (
        <div className="space-y-2">
          <h3 className="text-[12px] font-semibold text-stone-600 px-1 mt-2">รายการในช่วงนี้</h3>
          {items.map(t => <TransactionCard key={t.id} tx={t} readOnly onViewAtts={onViewAtts} />)}
        </div>
      ) : (
        <div className="bg-white rounded-2xl border border-stone-200 p-10 text-center">
          <Receipt size={32} className="mx-auto text-stone-300 mb-2" />
          <p className="text-sm text-stone-500">ไม่มีรายการในช่วงที่เลือก</p>
        </div>
      )}
    </div>
  );
}

// ─── สร้างรูปสรุป (Canvas) ───────────────────────────────────────
// โครงรูป (top → bottom):
//   1. หัวข้อ "สรุปยอดเบิกเงิน"
//   2. วันที่
//   3. รายการแยกรอบเช้า / รอบเย็น (+ พี่ X แยกท้ายถ้ามี)
//   4. รวมแต่ละรอบ
//   5. รายละเอียดการจ่าย (จ่ายเงินสด / โอน/สแกน / พี่ X) - ขนาดรอง
//   6. หมายเหตุเล็ก ๆ
//   7. ยอดเบิกรวมสุทธิ - ตัวใหญ่ที่สุด อยู่ล่างสุด
async function renderSummaryImage(summary, dateLabel, subtitle) {
  if (document.fonts) {
    try {
      await Promise.all([
        document.fonts.load('700 140px "IBM Plex Sans Thai"'),
        document.fonts.load('700 48px "IBM Plex Sans Thai"'),
        document.fonts.load('700 32px "IBM Plex Sans Thai"'),
        document.fonts.load('700 24px "IBM Plex Sans Thai"'),
        document.fonts.load('600 30px "IBM Plex Sans Thai"'),
        document.fonts.load('600 26px "IBM Plex Sans Thai"'),
        document.fonts.load('500 22px "IBM Plex Sans Thai"'),
        document.fonts.load('400 18px "IBM Plex Sans Thai"')
      ]);
    } catch (e) { /* ignore */ }
  }

  const W = 1080;
  const padding = 70;
  const FONT = '"IBM Plex Sans Thai", "Sarabun", system-ui, sans-serif';

  const groups = { 'เช้า': [], 'เย็น': [], 'X': [] };
  summary.items.forEach(t => {
    if (t.paymentMethod === X_PAYMENT) groups.X.push(t);
    else groups[t.shift].push(t);
  });
  ['เช้า', 'เย็น', 'X'].forEach(k => groups[k].sort((a, b) => a.createdAt - b.createdAt));

  // breakdown 2 ตัวเลือก + พี่ X
  let cash = 0, transfer = 0;
  summary.yItems.forEach(t => {
    if (t.paymentMethod === 'จ่ายเงินสด') cash += t.amount;
    else if (t.paymentMethod === 'โอน/สแกน') transfer += t.amount;
  });
  const breakdownLines = [];
  if (cash > 0) breakdownLines.push(['จ่ายเงินสด', cash, false]);
  if (transfer > 0) breakdownLines.push(['โอน/สแกน', transfer, false]);
  if (summary.xTotal > 0) breakdownLines.push(['พี่ X โอนเอง', summary.xTotal, true]);

  // สรุปทีมมีเดีย / ช่างติดตั้ง / OT
  const mediaSum = computeMediaSummary(summary.yItems);
  const teamCardCount =
    (mediaSum.installerCount > 0 ? 1 : 0) +
    (mediaSum.mediaCount > 0 ? 1 : 0) +
    (mediaSum.otCount > 0 ? 1 : 0);
  const showTeamSplit = teamCardCount > 0;

  const ITEM_H = 64;
  const SHIFT_HEAD_H = 50;
  const SUBTOTAL_H = 80;
  const X_NOTE_H = 30;
  const SECTION_GAP = 30;

  const headerH = 265;

  let itemsH;
  if (summary.count === 0) {
    itemsH = 200;
  } else {
    itemsH = 20;
    if (groups['เช้า'].length > 0) itemsH += SHIFT_HEAD_H + groups['เช้า'].length * ITEM_H + SUBTOTAL_H + SECTION_GAP;
    if (groups['เย็น'].length > 0) itemsH += SHIFT_HEAD_H + groups['เย็น'].length * ITEM_H + SUBTOTAL_H + SECTION_GAP;
    if (groups.X.length > 0) itemsH += SHIFT_HEAD_H + groups.X.length * ITEM_H + SUBTOTAL_H + X_NOTE_H + SECTION_GAP;
  }

  // กล่อง "สรุปตามทีม" — สูงตามจำนวนการ์ด (3 การ์ด stacked)
  const teamCardH = 110;
  const teamSplitH = showTeamSplit ? (90 + teamCardCount * teamCardH + 50) : 0;
  const breakdownH = breakdownLines.length > 0 ? 30 + 40 + 40 + breakdownLines.length * 42 + 20 : 0;
  const noteH = summary.xTotal > 0 ? 60 : 20;
  const footerH = 300;

  const H = headerH + itemsH + teamSplitH + breakdownH + noteH + footerH;

  const canvas = document.createElement('canvas');
  canvas.width = W;
  canvas.height = H;
  const ctx = canvas.getContext('2d');

  ctx.fillStyle = '#FAFAF9';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#047857';
  ctx.fillRect(0, 0, W, 8);

  // ═══ HEADER + DATE ═══
  let y = 90;
  ctx.fillStyle = '#0c4a3e';
  ctx.font = `700 48px ${FONT}`;
  ctx.fillText('สรุปยอดเบิกเงิน', padding, y);
  y += 50;

  ctx.fillStyle = '#78716c';
  ctx.font = `500 22px ${FONT}`;
  ctx.fillText(subtitle || '', padding, y);
  y += 35;

  ctx.fillStyle = '#1c1917';
  ctx.font = `600 30px ${FONT}`;
  ctx.fillText(dateLabel, padding, y);
  y += 30;

  ctx.strokeStyle = '#e7e5e4';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(padding, y + 20);
  ctx.lineTo(W - padding, y + 20);
  ctx.stroke();
  y += 60;

  // ═══ ITEMS BY SHIFT + SUBTOTALS ═══
  if (summary.count === 0) {
    ctx.fillStyle = '#a8a29e';
    ctx.font = `500 26px ${FONT}`;
    const txt = 'ไม่มีรายการในวันที่นี้';
    const tw = ctx.measureText(txt).width;
    ctx.fillText(txt, (W - tw) / 2, y + 90);
    y += 200;
  } else {
    y += 20;

    const drawShift = (items, accentColor, label, subtotalLabel, isX = false) => {
      if (items.length === 0) return;

      ctx.fillStyle = accentColor;
      ctx.fillRect(padding, y, 5, 32);

      ctx.fillStyle = '#1c1917';
      ctx.font = `600 26px ${FONT}`;
      ctx.fillText(label, padding + 18, y + 25);
      y += SHIFT_HEAD_H;

      items.forEach(t => {
        ctx.fillStyle = '#a8a29e';
        ctx.font = `500 22px ${FONT}`;
        ctx.fillText('•', padding + 16, y + 28);

        // Description
        const isMediaItem = t.category === MEDIA_CATEGORY;
        const isInstallerItem = t.category === INSTALLER_CATEGORY;
        const isOTItem = t.category === OT_CATEGORY;
        ctx.fillStyle = isX ? '#78716c' : '#292524';
        ctx.font = `500 22px ${FONT}`;
        let desc = t.description;
        const maxDescW = W - padding * 2 - 280;
        if (ctx.measureText(desc).width > maxDescW) {
          while (ctx.measureText(desc + '...').width > maxDescW && desc.length > 0) {
            desc = desc.slice(0, -1);
          }
          desc += '...';
        }
        ctx.fillText(desc, padding + 38, y + 24);

        // Category line — มี prefix ตามหมวด
        ctx.fillStyle = '#a8a29e';
        ctx.font = `400 16px ${FONT}`;
        let catLine = t.category;
        const txTeam = t.team || t.mediaTeam || '';
        const txSubType = t.subType || t.mediaSubType || '';
        if (isMediaItem) {
          const teamLabel = txTeam ? `🎥 ทีมมีเดีย · ${txTeam}` : '🎥 ทีมมีเดีย';
          catLine = `${teamLabel}${txSubType ? ` · ${txSubType}` : ''}`;
          ctx.fillStyle = '#7c3aed';
          ctx.font = `600 16px ${FONT}`;
        } else if (isInstallerItem) {
          const teamLabel = txTeam ? `🔧 ช่างติดตั้ง · ${txTeam}` : '🔧 ช่างติดตั้ง';
          catLine = `${teamLabel}${txSubType ? ` · ${txSubType}` : ''}`;
          ctx.fillStyle = '#ea580c';
          ctx.font = `600 16px ${FONT}`;
        } else if (isOTItem) {
          const otCount = t.ot && t.ot.count ? t.ot.count : 0;
          const otRate = t.ot && t.ot.rate ? t.ot.rate : 0;
          catLine = `⏰ OT · ${otCount} คน × ฿${otRate}`;
          ctx.fillStyle = '#e11d48';
          ctx.font = `600 16px ${FONT}`;
        }
        ctx.fillText(catLine, padding + 38, y + 48);

        // Attachment indicator
        if (t.attachments && t.attachments.length > 0) {
          const catW = ctx.measureText(catLine).width;
          ctx.fillStyle = '#10b981';
          ctx.font = `600 16px ${FONT}`;
          ctx.fillText('● มีหลักฐาน', padding + 38 + catW + 14, y + 48);
        }

        // Amount
        ctx.fillStyle = isX ? '#78716c' : '#1c1917';
        ctx.font = `700 24px ${FONT}`;
        const amt = `฿${fmt(t.amount)}`;
        const aw = ctx.measureText(amt).width;
        ctx.fillText(amt, W - padding - aw, y + 32);

        y += ITEM_H;
      });

      // Subtotal box
      const bg = isX ? '#f5f5f4' : '#f0fdf4';
      ctx.fillStyle = bg;
      ctx.beginPath();
      if (ctx.roundRect) ctx.roundRect(padding, y, W - padding * 2, 60, 12);
      else ctx.rect(padding, y, W - padding * 2, 60);
      ctx.fill();

      ctx.fillStyle = accentColor;
      ctx.fillRect(padding, y, 5, 60);

      ctx.fillStyle = isX ? '#78716c' : '#0c4a3e';
      ctx.font = `600 24px ${FONT}`;
      ctx.fillText(subtotalLabel, padding + 24, y + 38);

      ctx.font = `700 32px ${FONT}`;
      const stText = `฿${fmt(items.reduce((s, t) => s + t.amount, 0))}`;
      const stW = ctx.measureText(stText).width;
      ctx.fillText(stText, W - padding - 24 - stW, y + 40);

      y += SUBTOTAL_H;

      if (isX) {
        ctx.fillStyle = '#a8a29e';
        ctx.font = `400 16px ${FONT}`;
        ctx.fillText('* ไม่รวมในยอดเบิกที่ต้องจ่ายคืน', padding + 4, y + 18);
        y += X_NOTE_H;
      }

      y += SECTION_GAP;
    };

    drawShift(groups['เช้า'], '#f59e0b', '☀ รอบเช้า', 'รวมรอบเช้า');
    drawShift(groups['เย็น'], '#6366f1', '☾ รอบเย็น', 'รวมรอบเย็น');
    drawShift(groups.X, '#a8a29e', 'รายการพี่ X โอนเอง', 'รวมพี่ X โอนเอง', true);
  }

  // ═══ TEAM SPLIT (ช่างติดตั้ง / ทีมมีเดีย / OT) ═══
  if (showTeamSplit) {
    y += 20;

    // เส้นแบ่ง
    ctx.strokeStyle = '#e7e5e4';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(padding, y);
    ctx.lineTo(W - padding, y);
    ctx.stroke();
    y += 35;

    ctx.fillStyle = '#1c1917';
    ctx.font = `700 26px ${FONT}`;
    ctx.fillText('สรุปตามทีม', padding, y);
    y += 30;

    const boxFullW = W - padding * 2;

    // กล่องสรุปทีม — stack 3 การ์ด ครอบทั้งความกว้าง
    const drawTeamCard = (bgColor, accentColor, titleColor, valueColor, label, total, count, detailLine) => {
      ctx.fillStyle = bgColor;
      ctx.beginPath();
      if (ctx.roundRect) ctx.roundRect(padding, y, boxFullW, 90, 12);
      else ctx.rect(padding, y, boxFullW, 90);
      ctx.fill();

      ctx.fillStyle = accentColor;
      ctx.fillRect(padding, y, 5, 90);

      ctx.fillStyle = titleColor;
      ctx.font = `600 22px ${FONT}`;
      ctx.fillText(label, padding + 22, y + 35);

      ctx.fillStyle = '#a8a29e';
      ctx.font = `400 16px ${FONT}`;
      ctx.fillText(`${count} รายการ`, padding + 22, y + 60);

      // Total ขวา
      ctx.fillStyle = valueColor;
      ctx.font = `700 32px ${FONT}`;
      const tText = `฿${fmt(total)}`;
      const tW = ctx.measureText(tText).width;
      ctx.fillText(tText, W - padding - 22 - tW, y + 50);

      y += 100;

      if (detailLine) {
        ctx.fillStyle = accentColor;
        ctx.font = `500 16px ${FONT}`;
        ctx.fillText(detailLine, padding + 8, y + 14);
        y += 22;
      }
    };

    if (mediaSum.installerCount > 0) {
      const parts = [];
      if (mediaSum.installerSub.fuel > 0) parts.push(`น้ำมัน ฿${fmt(mediaSum.installerSub.fuel)}`);
      if (mediaSum.installerSub.toll > 0) parts.push(`ด่วน ฿${fmt(mediaSum.installerSub.toll)}`);
      if (mediaSum.installerSub.food > 0) parts.push(`ข้าว ฿${fmt(mediaSum.installerSub.food)}`);
      if (mediaSum.installerSub.other > 0) parts.push(`อื่นๆ ฿${fmt(mediaSum.installerSub.other)}`);
      const detail = parts.length > 0 ? parts.join(' · ') : '';
      drawTeamCard('#fff7ed', '#f97316', '#9a3412', '#9a3412',
        '🔧 ช่างติดตั้ง', mediaSum.installerTotal, mediaSum.installerCount, detail);
    }

    if (mediaSum.mediaCount > 0) {
      const parts = [];
      if (mediaSum.mediaSub.fuel > 0) parts.push(`น้ำมัน ฿${fmt(mediaSum.mediaSub.fuel)}`);
      if (mediaSum.mediaSub.toll > 0) parts.push(`ด่วน ฿${fmt(mediaSum.mediaSub.toll)}`);
      if (mediaSum.mediaSub.other > 0) parts.push(`อื่นๆ ฿${fmt(mediaSum.mediaSub.other)}`);
      if (mediaSum.mediaDistance > 0) parts.push(`${mediaSum.mediaDistance.toFixed(1)} กม.`);
      const detail = parts.length > 0 ? parts.join(' · ') : '';
      drawTeamCard('#faf5ff', '#a855f7', '#6b21a8', '#6b21a8',
        '🎥 ทีมมีเดีย', mediaSum.mediaTotal, mediaSum.mediaCount, detail);
    }

    if (mediaSum.otCount > 0) {
      const detail = mediaSum.otTotalPeople > 0 ? `รวม ${mediaSum.otTotalPeople} คน` : '';
      drawTeamCard('#fff1f2', '#e11d48', '#9f1239', '#9f1239',
        '⏰ OT', mediaSum.otTotal, mediaSum.otCount, detail);
    }

    y += 20;
  }

  // ═══ PAYMENT BREAKDOWN (ขนาดรอง) ═══
  if (breakdownLines.length > 0) {
    y += 30;
    ctx.strokeStyle = '#e7e5e4';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(padding, y);
    ctx.lineTo(W - padding, y);
    ctx.stroke();
    y += 40;

    ctx.fillStyle = '#78716c';
    ctx.font = `500 22px ${FONT}`;
    ctx.fillText('รายละเอียดการจ่าย', padding, y);
    y += 40;

    breakdownLines.forEach(([label, amount, faded]) => {
      ctx.fillStyle = faded ? '#a8a29e' : '#57534e';
      ctx.font = `500 22px ${FONT}`;
      ctx.fillText(label, padding + 8, y + 22);

      ctx.fillStyle = faded ? '#a8a29e' : '#1c1917';
      ctx.font = `600 24px ${FONT}`;
      const t = `฿${fmt(amount)}`;
      const tw = ctx.measureText(t).width;
      ctx.fillText(t, W - padding - tw, y + 22);

      y += 42;
    });
    y += 20;
  }

  // ═══ NOTE ═══
  if (summary.xTotal > 0) {
    ctx.fillStyle = '#a8a29e';
    ctx.font = `400 17px ${FONT}`;
    ctx.fillText('* รายการ "พี่ X โอนเอง" บันทึกเพื่อเก็บข้อมูล แต่ไม่รวมในยอดเบิก', padding, y + 22);
  }

  // ═══ ยอดเบิกรวมสุทธิ (ใหญ่ที่สุด อยู่ล่างสุด) ═══
  const blockY = H - footerH;

  ctx.fillStyle = '#064e3b';
  ctx.fillRect(0, blockY, W, footerH);

  ctx.fillStyle = '#10b981';
  ctx.fillRect(0, blockY, W, 5);

  ctx.fillStyle = '#a7f3d0';
  ctx.font = `500 28px ${FONT}`;
  ctx.fillText('ยอดเบิกรวมสุทธิ', padding, blockY + 70);

  ctx.fillStyle = '#ffffff';
  ctx.font = `700 140px ${FONT}`;
  ctx.fillText(`฿${fmt(summary.total)}`, padding, blockY + 215);

  ctx.fillStyle = '#6ee7b7';
  ctx.font = `400 18px ${FONT}`;
  ctx.fillText(`(${fmtInt(summary.yCount)} รายการ ไม่รวมพี่ X จ่ายเอง)`, padding, blockY + 255);

  return canvas;
}

// ─── Modal ตัวอย่างรูป ──────────────────────────────────────────
function ImagePreviewModal({ canvas, filename, onClose }) {
  const [imgUrl, setImgUrl] = useState(null);

  useEffect(() => {
    if (!canvas) return;
    let url;
    canvas.toBlob(blob => {
      if (blob) {
        url = URL.createObjectURL(blob);
        setImgUrl(url);
      }
    }, 'image/png');
    return () => {
      if (url) URL.revokeObjectURL(url);
    };
  }, [canvas]);

  const download = () => {
    canvas.toBlob(blob => {
      if (!blob) return;
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }, 'image/png');
  };

  return (
    <div className="fixed inset-0 bg-black/70 z-50 flex items-end sm:items-center justify-center p-3" onClick={onClose}>
      <div className="bg-white rounded-2xl p-4 max-w-md w-full max-h-[92vh] flex flex-col" onClick={e => e.stopPropagation()}>
        <div className="flex items-center justify-between mb-3 flex-shrink-0">
          <div>
            <h3 className="text-base font-semibold text-stone-900">รูปสรุปส่งพี่ X</h3>
            <p className="text-[11px] text-stone-500">บันทึกแล้วส่งทาง LINE ได้เลย</p>
          </div>
          <button onClick={onClose} className="w-8 h-8 grid place-items-center rounded-full hover:bg-stone-100">
            <X size={18} />
          </button>
        </div>

        <div className="flex-1 overflow-y-auto bg-stone-100 rounded-xl p-3 mb-3 flex justify-center">
          {imgUrl ? (
            <img src={imgUrl} alt="สรุปยอด" className="w-full max-w-sm rounded-lg shadow-md" />
          ) : (
            <div className="text-stone-400 text-sm py-10">กำลังสร้างรูป...</div>
          )}
        </div>

        <button
          onClick={download}
          disabled={!imgUrl}
          className="w-full bg-emerald-700 hover:bg-emerald-800 disabled:bg-stone-300 text-white py-3 rounded-xl font-semibold text-sm flex items-center justify-center gap-2"
        >
          <Download size={16} />ดาวน์โหลดรูป
        </button>
        <p className="text-[10.5px] text-stone-400 text-center mt-2">
          กดค้างที่รูปเพื่อบันทึกลงเครื่อง หรือกดดาวน์โหลดด้านบน
        </p>
      </div>
    </div>
  );
}

// ─── Modal ดูไฟล์แนบ ───────────────────────────────────────────
function AttachmentViewer({ attachments, onClose }) {
  const [selected, setSelected] = useState(0);
  const [dataUrls, setDataUrls] = useState({});
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    let cancelled = false;
    (async () => {
      const urls = {};
      await Promise.all(
        attachments.map(async (att) => {
          const v = await loadAttachment(att.id);
          if (v) urls[att.id] = v;
        })
      );
      if (!cancelled) {
        setDataUrls(urls);
        setLoading(false);
      }
    })();
    return () => { cancelled = true; };
  }, [attachments]);

  const att = attachments[selected];
  const url = att ? dataUrls[att.id] : null;
  const isPdf = att && att.type === 'application/pdf';

  const downloadCurrent = () => {
    if (!url) return;
    const a = document.createElement('a');
    a.href = url;
    a.download = att.name;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  };

  const next = () => setSelected(s => Math.min(s + 1, attachments.length - 1));
  const prev = () => setSelected(s => Math.max(s - 1, 0));

  return (
    <div className="fixed inset-0 bg-black/90 z-50 flex flex-col" onClick={onClose}>
      <div className="bg-stone-900 text-white px-4 py-3 flex items-center gap-3 flex-shrink-0" onClick={e => e.stopPropagation()}>
        <button onClick={onClose} className="w-8 h-8 grid place-items-center rounded-full hover:bg-stone-800">
          <X size={18} />
        </button>
        <div className="flex-1 min-w-0">
          <p className="text-[13px] font-medium truncate">{att?.name || 'หลักฐาน'}</p>
          <p className="text-[10.5px] text-stone-400">
            {selected + 1} / {attachments.length} {att && `· ${isPdf ? 'PDF' : 'รูป'}`}
          </p>
        </div>
        {url && (
          <button onClick={downloadCurrent} className="w-8 h-8 grid place-items-center rounded-full hover:bg-stone-800">
            <Download size={16} />
          </button>
        )}
      </div>

      <div className="flex-1 overflow-auto flex items-center justify-center p-3" onClick={e => e.stopPropagation()}>
        {loading ? (
          <div className="text-stone-400 text-sm">กำลังโหลด...</div>
        ) : !url ? (
          <div className="text-stone-400 text-sm text-center">
            <AlertCircle size={28} className="mx-auto mb-2" />
            ไม่พบไฟล์แนบ — อาจถูกลบไปแล้ว
          </div>
        ) : isPdf ? (
          <iframe src={url} title={att.name} className="w-full h-full bg-white rounded" />
        ) : (
          <img src={url} alt={att.name} className="max-w-full max-h-full rounded shadow-2xl" />
        )}
      </div>

      {attachments.length > 1 && (
        <div className="bg-stone-900 px-3 py-2 flex items-center gap-2 flex-shrink-0" onClick={e => e.stopPropagation()}>
          <button onClick={prev} disabled={selected === 0}
            className="w-8 h-8 grid place-items-center rounded-full bg-stone-800 text-white disabled:opacity-30 hover:bg-stone-700">
            <ChevronLeft size={16} />
          </button>
          <div className="flex-1 flex gap-1.5 overflow-x-auto justify-center">
            {attachments.map((a, i) => (
              <button key={a.id} onClick={() => setSelected(i)}
                className={`px-2.5 py-1 rounded-md text-[11px] font-medium whitespace-nowrap ${
                  i === selected ? 'bg-white text-stone-900' : 'bg-stone-700 text-stone-200 hover:bg-stone-600'
                }`}>
                {i + 1}
              </button>
            ))}
          </div>
          <button onClick={next} disabled={selected === attachments.length - 1}
            className="w-8 h-8 grid place-items-center rounded-full bg-stone-800 text-white disabled:opacity-30 hover:bg-stone-700">
            <ChevronRight size={16} />
          </button>
        </div>
      )}
    </div>
  );
}

// ─── Mount ───────────────────────────────────────────────────────
const _root = ReactDOM.createRoot(document.getElementById("root"));
_root.render(<PettyCashSystem />);
  </script>

  <script>
    // ซ่อน loading หลัง React mount เสร็จ
    const observer = new MutationObserver(() => {
      const root = document.getElementById('root');
      if (root && root.children.length > 0) {
        document.getElementById('loading')?.classList.add('gone');
        observer.disconnect();
      }
    });
    observer.observe(document.getElementById('root'), { childList: true });

    // Fallback: ซ่อน loading หลัง 8 วินาทีไม่ว่ายังไง
    setTimeout(() => {
      document.getElementById('loading')?.classList.add('gone');
    }, 8000);
  </script>
