  <!-- CRITICAL CSS — ทำงานแม้ Tailwind ไม่โหลด                -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      font-family: 'IBM Plex Sans Thai', system-ui, -apple-system, sans-serif;
      background: #FAFAF9;
      color: #1c1917;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior-y: none;
      min-height: 100vh;
    }

    /* iOS auto-zoom prevention */
    input, select, textarea {
      font-size: 16px !important;
      font-family: inherit;
    }
    button { font-family: inherit; }

    /* Reset appearance — ครอบคลุม iOS Safari, Chrome Android, Firefox Android, Samsung Internet */
    button, input, textarea {
      -webkit-appearance: none;
      -moz-appearance: none;
      appearance: none;
    }
    select {
      -webkit-appearance: none;
      -moz-appearance: none;
      appearance: none;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2378716c' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'/%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: right 12px center;
      background-size: 16px;
      padding-right: 38px !important;
    }

    /* Android Chrome: ปิด ::after สีเทาตอน focus */
    button:focus, input:focus, select:focus, textarea:focus {
      outline: none;
    }
    /* แต่ keep accessibility — focus-visible แสดง outline เฉพาะ keyboard */
    button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible {
      outline: 2px solid #047857;
      outline-offset: 1px;
    }

    /* Loading screen */
    #loading {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      color: #57534e; font-size: 14px;
      z-index: 100; background: #FAFAF9;
    }
    #loading.gone { display: none; }
    #loading .spinner {
      width: 40px; height: 40px; border-radius: 50%;
      border: 3px solid #e7e5e4; border-top-color: #047857;
      animation: spin 0.8s linear infinite; margin-bottom: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading .text { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    #loading .small { font-size: 11px; color: #a8a29e; }

    /* Safe area helpers */
    .pb-safe { padding-bottom: calc(24px + env(safe-area-inset-bottom)); }
    .pt-safe { padding-top: env(safe-area-inset-top); }

    /* ═══════ HEADER ═══════ */
    .app-header {
      position: sticky; top: 0; z-index: 20;
      background: #ffffff;
      border-bottom: 1px solid #e7e5e4;
      padding-top: env(safe-area-inset-top);
    }
    .app-header-inner {
      max-width: 1024px;
      margin: 0 auto;
      padding: 10px 12px 8px;
    }
    .app-brand {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 8px;
      min-width: 0;
    }
    .app-brand-icon {
      width: 32px; height: 32px;
      border-radius: 8px;
      background: linear-gradient(135deg, #047857, #065f46);
      color: #ffffff;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 1px 2px rgba(0,0,0,0.08);
    }
    .app-brand-icon svg { width: 18px; height: 18px; }
    .app-brand-text { min-width: 0; flex: 1; }
    .app-brand-title {
      font-size: 15px; font-weight: 600; color: #1c1917;
      line-height: 1.2; margin: 0;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .app-brand-subtitle {
      font-size: 11px; color: #78716c; margin: 0;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    /* ═══════ TAB BAR ═══════ */
    .app-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 4px;
      background: #f5f5f4;
      padding: 4px;
      border-radius: 8px;
    }
    .app-tab {
      display: flex; align-items: center; justify-content: center;
      gap: 5px;
      padding: 9px 4px;
      border: none; background: transparent;
      border-radius: 6px;
      font-size: 13.5px; font-weight: 500;
      color: #57534e;
      white-space: nowrap;
      transition: all 0.15s;
      cursor: pointer;
      min-height: 38px;
    }
    .app-tab svg { width: 13px; height: 13px; flex-shrink: 0; }
    .app-tab.active {
      background: #ffffff;
      color: #047857;
      box-shadow: 0 1px 2px rgba(0,0,0,0.06);
    }

    /* ═══════ MAIN ═══════ */
    .app-main {
      max-width: 1024px;
      margin: 0 auto;
      padding: 12px;
      padding-bottom: calc(40px + env(safe-area-inset-bottom));
    }

    /* ═══════ SHIFT TOGGLE ═══════ */
    .shift-toggle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
      background: #f5f5f4;
      padding: 4px;
      border-radius: 8px;
    }
    .shift-btn {
      display: flex; align-items: center; justify-content: center;
      gap: 5px;
      padding: 8px 4px;
      border: none; background: transparent;
      border-radius: 6px;
      font-size: 14px; font-weight: 500;
      color: #57534e;
      white-space: nowrap;
      cursor: pointer;
      min-height: 36px;
      transition: all 0.15s;
    }
    .shift-btn svg { width: 13px; height: 13px; flex-shrink: 0; }
    .shift-btn.active-morning {
      background: #fef3c7;
      color: #92400e;
      box-shadow: 0 1px 2px rgba(0,0,0,0.06);
    }
    .shift-btn.active-evening {
      background: #e0e7ff;
      color: #3730a3;
      box-shadow: 0 1px 2px rgba(0,0,0,0.06);
    }

    /* ═══════ MOBILE (max-width: 640px) ═══════ */
    @media (max-width: 640px) {
      .app-header-inner { padding: 8px 12px 6px !important; }
      .app-brand { margin-bottom: 6px !important; gap: 8px !important; }
      .app-brand-icon { width: 28px !important; height: 28px !important; border-radius: 7px !important; }
      .app-brand-icon svg { width: 16px !important; height: 16px !important; }
      .app-brand-title { font-size: 14.5px !important; }
      .app-brand-subtitle { display: none !important; }

      .app-tab svg { display: none !important; }
      .app-tab { padding: 9px 4px !important; font-size: 14px !important; min-height: 40px !important; }

      .app-main { padding: 10px 12px !important; padding-bottom: calc(30px + env(safe-area-inset-bottom)) !important; }

      .shift-btn svg { display: none !important; }
      .shift-btn { font-size: 14.5px !important; padding: 9px 4px !important; min-height: 40px !important; }

      input[type="text"], input[type="number"], input[type="date"],
      input[type="email"], input[type="tel"], input[type="search"],
      select, textarea {
        font-size: 16px !important;
        min-height: 44px !important;
        padding: 10px 12px !important;
      }
      select { padding-right: 38px !important; }
      textarea { min-height: 64px !important; }
    }

    @supports (-webkit-touch-callout: none) {
      input[type="date"] { min-height: 44px; }
    }

    /* ═══════ ANDROID-specific tweaks ═══════ */
    /* Android Chrome: date input ดู native ดีอยู่แล้ว แต่ height อาจไม่พอ */
    input[type="date"]::-webkit-date-and-time-value {
      text-align: left;
      min-height: 1.2em;
    }
    /* Android: ตัด default tap ripple ที่อาจชนกับ button styling */
    button { touch-action: manipulation; }

    /* Android Chrome scrollbar (hide แต่ scroll ได้) */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d6d3d1; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #a8a29e; }

    /* Firefox: scrollbar */
    * { scrollbar-width: thin; scrollbar-color: #d6d3d1 transparent; }

    /* ปิด tap delay บน Android */
    a, button, [role="button"] { touch-action: manipulation; }

    /* Date input บาง Android ใช้ font ผิด */
    input[type="date"] { font-family: inherit; }
  </style>
</head>

// ─── localStorage shim — API เดียวกับ window.storage ของ Claude ─────────
const _storage = {
  async get(key) {
    const v = localStorage.getItem(key);
    return v === null ? null : { key, value: v, shared: false };
  },
  async set(key, value) {
    try {
      localStorage.setItem(key, value);
      return { key, value, shared: false };
    } catch (e) {
      console.error("localStorage error:", e);
      throw new Error("พื้นที่จัดเก็บเต็ม — ลองลบไฟล์แนบเก่าออกบ้าง");
    }
  },
  async delete(key) {
    localStorage.removeItem(key);
    return { key, deleted: true, shared: false };
  },
  async list(prefix) {
    const keys = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (!prefix || k.startsWith(prefix)) keys.push(k);
    }
    return { keys };
  }
};
window.storage = _storage;

const generateId = () => `tx_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;
const generateAttId = () => `att_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;

const THAI_MONTHS = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน",
  "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
const formatThaiDate = (isoDate) => {
  if (!isoDate) return "";
  const [y, m, d] = isoDate.split("-").map(Number);
  return `${d} ${THAI_MONTHS[m - 1]} ${y + 543}`;
};

function computeSummary(transactions, filterFn) {
  const inScope = transactions.filter(t => !t.cancelled && filterFn(t));
  const yPaid = inScope.filter(t => t.paymentMethod !== X_PAYMENT);
  const xPaid = inScope.filter(t => t.paymentMethod === X_PAYMENT);
  return {
    items: inScope,
    yItems: yPaid,
    xItems: xPaid,
    total: yPaid.reduce((s, t) => s + t.amount, 0),
    morning: yPaid.filter(t => t.shift === "เช้า").reduce((s, t) => s + t.amount, 0),
    evening: yPaid.filter(t => t.shift === "เย็น").reduce((s, t) => s + t.amount, 0),
    xTotal: xPaid.reduce((s, t) => s + t.amount, 0),
    count: inScope.length,
    yCount: yPaid.length,
    xCount: xPaid.length
  };
}

// สรุปยอดทีมมีเดีย (เฉพาะที่ไม่ใช่พี่ X โอนเอง)
// computeTeamSummary — แยกยอดตามทีม / OT
//   media     = หมวดทีมมีเดีย (ไม่นับพี่ X)
//   installer = หมวดช่างติดตั้ง (ไม่นับพี่ X)
//   ot        = หมวด OT (ไม่นับพี่ X)
//   other     = หมวดที่เหลือ (ไม่นับพี่ X)
function computeTeamSummary(items) {
  const ofCat = (cat) => items.filter(t =>
    t.category === cat && t.paymentMethod !== X_PAYMENT
  );
  const media = ofCat(MEDIA_CATEGORY);
  const installer = ofCat(INSTALLER_CATEGORY);
  const ot = ofCat(OT_CATEGORY);
  const other = items.filter(t =>
    t.category !== MEDIA_CATEGORY &&
    t.category !== INSTALLER_CATEGORY &&
    t.category !== OT_CATEGORY &&
    t.paymentMethod !== X_PAYMENT
  );

  // breakdown จาก mileage fields (ฟอร์มรวม)
  // legacy: ถ้าไม่มี mileage breakdown ให้ดูจาก subType เดิม
  const computeSub = (group) => {
    const sub = { fuel: 0, toll: 0, other: 0, food: 0 };
    let totalDistance = 0;
    group.forEach(t => {
      const m = t.mileage;
      if (m && (m.fuelCost > 0 || m.tollFee > 0 || m.foodCost > 0 || m.otherCost > 0)) {
        // schema ใหม่: breakdown จาก mileage
        sub.fuel += m.fuelCost || 0;
        sub.toll += m.tollFee || 0;
        sub.food += m.foodCost || 0;
        sub.other += m.otherCost || 0;
        if (m.distance) totalDistance += m.distance;
      } else {
        // schema เก่า: ดูจาก subType + amount
        const st = t.subType || t.mediaSubType || "";
        if (st === "ค่าน้ำมัน") sub.fuel += t.amount;
        else if (st === "ค่าทางด่วน") sub.toll += t.amount;
        else if (st === "ค่าข้าวออกนอกพื้นที่") sub.food += t.amount;
        else sub.other += t.amount;
        if (m && m.distance) totalDistance += m.distance;
      }
    });
    return { sub, totalDistance };
  };

  const mediaDetail = computeSub(media);
  const installerDetail = computeSub(installer);

  // OT — รวมจำนวนคนทั้งหมด
  let otTotalPeople = 0;
  ot.forEach(t => {
    if (t.ot && t.ot.count) otTotalPeople += t.ot.count;
  });

  return {
    media, installer, ot, other,
    mediaTotal: media.reduce((s, t) => s + t.amount, 0),
    installerTotal: installer.reduce((s, t) => s + t.amount, 0),
    otTotal: ot.reduce((s, t) => s + t.amount, 0),
    otherTotal: other.reduce((s, t) => s + t.amount, 0),
    mediaCount: media.length,
    installerCount: installer.length,
    otCount: ot.length,
    otherCount: other.length,
    mediaSub: mediaDetail.sub,
    mediaDistance: mediaDetail.totalDistance,
    installerSub: installerDetail.sub,
    installerDistance: installerDetail.totalDistance,
    otTotalPeople
  };
}

// alias เพื่อ backward compat
const computeMediaSummary = computeTeamSummary;

// ─── ระบบไฟล์แนบ ─────────────────────────────────────────────────
function compressImage(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const c = document.createElement('canvas');
        let { width, height } = img;
        if (width > COMPRESS_MAX_W) {
          height = (height * COMPRESS_MAX_W) / width;
          width = COMPRESS_MAX_W;
        }
        c.width = width;
        c.height = height;
        const ctx = c.getContext('2d');
        ctx.fillStyle = '#fff';
        ctx.fillRect(0, 0, width, height);
        ctx.drawImage(img, 0, 0, width, height);
        c.toBlob(blob => {
          if (!blob) return reject(new Error('compress failed'));
          const r = new FileReader();
          r.onload = () => resolve(r.result);
          r.onerror = reject;
          r.readAsDataURL(blob);
        }, 'image/jpeg', COMPRESS_QUALITY);
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function fileToDataUrl(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function saveAttachment(file) {
  let dataUrl;
  if (file.type.startsWith('image/')) {
    dataUrl = await compressImage(file);
  } else if (file.type === 'application/pdf') {
    dataUrl = await fileToDataUrl(file);
  } else {
    throw new Error('ไฟล์ประเภทนี้ไม่รองรับ (รองรับ JPG, PNG, PDF)');
  }

  const sizeBytes = Math.ceil(dataUrl.length * 0.75);
  if (sizeBytes > MAX_FILE_BYTES) {
    throw new Error(`ไฟล์ใหญ่เกินไป (${(sizeBytes / 1024 / 1024).toFixed(1)}MB) — สูงสุด ~4.5MB`);
  }

  const id = generateAttId();
  await window.storage.set(`${ATT_KEY_PREFIX}${id}`, dataUrl);
  return {
    id,
    name: file.name,
    type: file.type === 'image/png' ? 'image/jpeg' : file.type, // PNG ถูกแปลงเป็น JPEG ตอนบีบ
    sizeKB: Math.round(sizeBytes / 1024)
  };
}

async function loadAttachment(id) {
  try {
    const r = await window.storage.get(`${ATT_KEY_PREFIX}${id}`);
    return r ? r.value : null;
  } catch (e) { return null; }
}

// ─── Connection Status Badge ─────────────────────────────────
function ConnStatusBadge({ status }) {
  const { mode, connected, error } = status;
  let label, bg, color, dotColor;

  if (mode === 'demo') {
    label = 'Demo';
    bg = '#fef3c7'; color = '#92400e'; dotColor = '#f59e0b';
  } else if (connected === true) {
    label = 'Online';
    bg = '#d1fae5'; color = '#065f46'; dotColor = '#10b981';
  } else if (connected === false) {
    label = 'Offline';
    bg = '#fee2e2'; color = '#991b1b'; dotColor = '#ef4444';
  } else {
    label = '...';
    bg = '#f5f5f4'; color = '#57534e'; dotColor = '#a8a29e';
  }

  return (
    <div
      title={error || `${mode === 'online' ? 'เชื่อม Google Sheets' : 'ใช้ localStorage'}`}
      style={{
        display: 'inline-flex',
        alignItems: 'center',
        gap: '4px',
        padding: '3px 8px',
        borderRadius: '6px',
        background: bg,
        color: color,
        fontSize: '10.5px',
        fontWeight: 600,
        flexShrink: 0,
        whiteSpace: 'nowrap'
      }}
    >
      <span style={{
        display: 'inline-block',
        width: '6px', height: '6px',
        borderRadius: '50%',
        background: dotColor,
        animation: connected === null ? 'spin 1s linear infinite' : 'none'
      }} />
      {label}
    </div>
  );
}

// ─── Main App ────────────────────────────────────────────────────
function PettyCashSystem() {
  const [tab, setTab] = useState("add");
  const [transactions, setTransactions] = useState([]);
  const [loading, setLoading] = useState(true);
  const [toast, setToast] = useState(null);
  const [previewItems, setPreviewItems] = useState(null);
  const [viewingAtts, setViewingAtts] = useState(null);
  const [connStatus, setConnStatus] = useState({
    mode: (window.PettyCashStatus && window.PettyCashStatus.mode) || 'demo',
    connected: null,
    error: null
  });

  // Subscribe to API status changes
  useEffect(() => {
    if (typeof window.onPettyCashStatusChange === 'function') {
      const unsub = window.onPettyCashStatusChange((s) => {
        setConnStatus({ mode: s.mode, connected: s.connected, error: s.error });
      });
      return unsub;
    }
  }, []);

  useEffect(() => {
    (async () => {
      // ลำดับ: v3 → v2 (migrate) → v1 (migrate)
      try {
        const r = await window.storage.get(STORAGE_KEY_V3);
        if (r) {
          const data = JSON.parse(r.value);
          setTransactions(data.transactions || []);
          setLoading(false);
          return;
        }
      } catch (e) { /* ignore */ }

      try {
        const r2 = await window.storage.get(STORAGE_KEY_V2);
        if (r2) {
          const data = JSON.parse(r2.value);
          const migrated = (data.transactions || []).map(t => ({
            ...t,
            paymentMethod: migratePM(t.paymentMethod),
            attachments: t.attachments || []
          }));
          setTransactions(migrated);
          await window.storage.set(STORAGE_KEY_V3, JSON.stringify({ transactions: migrated }));
          setLoading(false);
          return;
        }
      } catch (e) { /* ignore */ }

      try {
        const r1 = await window.storage.get(STORAGE_KEY_V1);
        if (r1) {
          const data = JSON.parse(r1.value);
          const migrated = (data.transactions || []).map(t => ({
            id: t.id,
            date: t.date,
            shift: t.shift,
            category: t.category,
            description: t.description,
            amount: t.amount,
            paymentMethod: migratePM(t.paymentMethod),
            note: t.note || "",
            createdAt: t.createdAt,
            cancelled: t.status === "ยกเลิก",
            cancelledAt: t.status === "ยกเลิก" ? (t.cancelledAt || t.createdAt) : null,
            attachments: []
          }));
          setTransactions(migrated);
          await window.storage.set(STORAGE_KEY_V3, JSON.stringify({ transactions: migrated }));
        }
      } catch (e) { /* ignore */ }
      finally { setLoading(false); }
    })();
  }, []);

  const persist = async (txs) => {
    try {
      await window.storage.set(STORAGE_KEY_V3, JSON.stringify({ transactions: txs }));
    } catch (e) {
      showToast("บันทึกข้อมูลไม่สำเร็จ — ลองใหม่อีกครั้ง", "error");
    }
  };

  const showToast = (msg, type = "success") => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 2800);
  };

  const addTransaction = async (data) => {
    const tx = {
      id: generateId(),
      ...data,
      createdAt: Date.now(),
      cancelled: false,
      cancelledAt: null
    };
    const next = [tx, ...transactions];
    setTransactions(next);
    await persist(next);
    showToast("บันทึกรายการเรียบร้อย");
  };

  const cancelTransaction = async (id) => {
    const next = transactions.map(t =>
      t.id === id ? { ...t, cancelled: true, cancelledAt: Date.now() } : t
    );
    setTransactions(next);
    await persist(next);
    showToast("ยกเลิกรายการแล้ว — ข้อมูลเดิมยังเก็บไว้ตรวจสอบได้");
  };

  // items: array ของ { canvas, name, label }
  const showImagePreview = (items) => {
    setPreviewItems(items);
  };

  return (
    <div className="min-h-screen bg-stone-50 text-stone-900">
      <header className="app-header">
        <div className="app-header-inner">
          <div className="app-brand">
            <div className="app-brand-icon">
              <Wallet size={18} strokeWidth={2.2} />
            </div>
            <div className="app-brand-text">
              <h1 className="app-brand-title">ระบบเบิกเงินสดย่อย</h1>
              <p className="app-brand-subtitle">บันทึก · ดูย้อนหลัง · สร้างรูปสรุปส่งพี่ X</p>
            </div>
            <ConnStatusBadge status={connStatus} />
          </div>

          <nav className="app-tabs">
            <button
              type="button"
              onClick={() => setTab("add")}
              className={"app-tab" + (tab === "add" ? " active" : "")}
            >
              <PlusCircle size={13} />
              <span>เพิ่มรายการ</span>
            </button>
            <button
              type="button"
              onClick={() => setTab("history")}
              className={"app-tab" + (tab === "history" ? " active" : "")}
            >
              <History size={13} />
              <span>ประวัติ</span>
            </button>
            <button
              type="button"
              onClick={() => setTab("summary")}
              className={"app-tab" + (tab === "summary" ? " active" : "")}
            >
              <BarChart3 size={13} />
              <span>สรุป</span>
            </button>
          </nav>
        </div>
      </header>

      <main className="app-main">
        {loading ? (
          <div className="text-center py-20 text-stone-500 text-sm">กำลังโหลดข้อมูล...</div>
        ) : (
          <>
            {tab === "add" && <AddView onAdd={addTransaction} />}
            {tab === "history" && (
              <HistoryView
                transactions={transactions}
                onCancel={cancelTransaction}
                onViewAtts={setViewingAtts}
              />
            )}
            {tab === "summary" && <SummaryView transactions={transactions} onShowImage={showImagePreview} onViewAtts={setViewingAtts} />}
          </>
        )}
      </main>

      {toast && (
        <div
          className={`fixed left-1/2 -translate-x-1/2 px-5 py-3 rounded-xl shadow-2xl text-sm font-medium z-50 flex items-center gap-2 ${
            toast.type === "error" ? "bg-red-600 text-white" : "bg-stone-900 text-white"
          }`}
          style={{ bottom: "calc(20px + env(safe-area-inset-bottom))" }}
        >
          {toast.type === "error" ? <AlertCircle size={16} /> : <Check size={16} />}
          {toast.msg}
        </div>
      )}

      {previewItems && (
        <ImagePreviewModal
          items={previewItems}
          onClose={() => setPreviewItems(null)}
        />
      )}

      {viewingAtts && (
        <AttachmentViewer attachments={viewingAtts} onClose={() => setViewingAtts(null)} />
      )}
    </div>
  );
}

// ─── หน้าเพิ่มรายการ ──────────────────────────────────────────────
function AddView({ onAdd }) {
  const [form, setForm] = useState({
    date: todayStr(),
    shift: "เช้า",
    category: CATEGORIES[0],
    description: "",
    amount: "",
    paymentMethod: PAYMENT_METHODS[0],
    note: "",
    // ทีม (ช่างติดตั้ง / ทีมมีเดีย) — ฟอร์มรวม 1 บล็อก
    team: "",
    // ฟอร์มรวมไมล์ + ค่าใช้จ่ายในรอบ (ทุก slot กรอกได้/เว้นได้)
    mileage: { before: "", after: "", tollFee: "", foodCost: "", otherCost: "" },
    // ฟอร์ม OT
    ot: { workers: "", count: "", rate: OT_DEFAULT_RATE }
  });
  const [pendingFiles, setPendingFiles] = useState([]);
  const [errors, setErrors] = useState({});
  const [filesError, setFilesError] = useState(null);
  const [submitting, setSubmitting] = useState(false);

  const update = (key, val) => {
    setForm(f => ({ ...f, [key]: val }));
    if (errors[key]) setErrors(e => ({ ...e, [key]: null }));
  };

  // เซ็ต team อัตโนมัติเมื่อเปลี่ยนหมวด
  const isInstaller = form.category === INSTALLER_CATEGORY;
  const isMedia = form.category === MEDIA_CATEGORY;
  const isOT = form.category === OT_CATEGORY;
  const isTeamCategory = isInstaller || isMedia;
  const teams = getTeamsFor(form.category);

  // เมื่อเปลี่ยน category — ตั้ง team เริ่มต้นและ reset ฟอร์มไมล์
  useEffect(() => {
    if (isTeamCategory) {
      setForm(f => ({ ...f, team: teams[0] || "" }));
    } else {
      setForm(f => ({ ...f, team: "" }));
    }
    // eslint-disable-next-line
  }, [form.category]);

  const mileage = form.mileage;

  const distance = useMemo(() => {
    const b = parseFloat(mileage.before);
    const a = parseFloat(mileage.after);
    if (isNaN(b) || isNaN(a)) return null;
    return Math.max(0, a - b);
  }, [mileage.before, mileage.after]);

  // เรทคำนวณอัตโนมัติ: ≤120 = 6, >120 = 5
  const fuelRate = useMemo(() => fuelRateFor(distance), [distance]);

  const fuelCost = useMemo(() => {
    if (distance === null || fuelRate === null) return 0;
    return distance * fuelRate;
  }, [distance, fuelRate]);

  // ยอดรวม = น้ำมัน + ทางด่วน + ข้าว (เฉพาะช่าง) + อื่น ๆ
  const mileageTotal = useMemo(() => {
    const f = fuelCost || 0;
    const t = parseFloat(mileage.tollFee) || 0;
    const food = isInstaller ? (parseFloat(mileage.foodCost) || 0) : 0;
    const o = parseFloat(mileage.otherCost) || 0;
    return f + t + food + o;
  }, [fuelCost, mileage.tollFee, mileage.foodCost, mileage.otherCost, isInstaller]);

  // Auto-fill amount จากฟอร์มรวมไมล์ (ทุกครั้งที่อยู่ในหมวดทีม)
  useEffect(() => {
    if (isTeamCategory) {
      setForm(f => ({ ...f, amount: mileageTotal > 0 ? mileageTotal.toFixed(2) : "" }));
    }
  }, [isTeamCategory, mileageTotal]);

  // Auto-fill amount จาก OT
  const otTotal = useMemo(() => {
    const c = parseFloat(form.ot.count);
    const r = parseFloat(form.ot.rate);
    if (isNaN(c) || isNaN(r)) return null;
    return c * r;
  }, [form.ot.count, form.ot.rate]);

  useEffect(() => {
    if (isOT && otTotal !== null) {
      setForm(f => ({ ...f, amount: otTotal.toFixed(2) }));
    }
  }, [isOT, otTotal]);

  const updateMileage = (key, val) => {
    setForm(f => ({ ...f, mileage: { ...f.mileage, [key]: val } }));
  };
  const updateOT = (key, val) => {
    setForm(f => ({ ...f, ot: { ...f.ot, [key]: val } }));
  };

  const handleFilePick = (e) => {
    const picked = Array.from(e.target.files || []);
    const accepted = [];
    const rejected = [];
    picked.forEach(f => {
      if (ALLOWED_TYPES.includes(f.type) || (f.type === '' && /\.(jpe?g|png|pdf)$/i.test(f.name))) {
        accepted.push(f);
      } else {
        rejected.push(f.name);
      }
    });
    if (rejected.length > 0) {
      setFilesError(`ไฟล์ที่ไม่รองรับ: ${rejected.join(", ")}`);
    } else {
      setFilesError(null);
    }
    setPendingFiles(prev => [...prev, ...accepted]);
    e.target.value = '';
  };

  const removePendingFile = (idx) => {
    setPendingFiles(prev => prev.filter((_, i) => i !== idx));
  };

  const submit = async () => {
    const errs = {};
    if (!form.description.trim()) errs.description = "กรุณาใส่ชื่อรายการ";
    if (!form.amount || parseFloat(form.amount) <= 0) errs.amount = "กรุณาใส่จำนวนเงิน";
    if (!form.date) errs.date = "กรุณาเลือกวันที่";
    if (Object.keys(errs).length) {
      setErrors(errs);
      return;
    }

    setSubmitting(true);
    setFilesError(null);

    // ประมวลผลและบันทึกไฟล์แนบก่อน
    const attachments = [];
    for (const file of pendingFiles) {
      try {
        const meta = await saveAttachment(file);
        attachments.push(meta);
      } catch (err) {
        setFilesError(`"${file.name}": ${err.message || "บันทึกไฟล์ไม่สำเร็จ"}`);
        setSubmitting(false);
        return;
      }
    }

    await onAdd({
      date: form.date,
      shift: form.shift,
      category: form.category,
      description: form.description.trim(),
      amount: parseFloat(form.amount),
      paymentMethod: form.paymentMethod,
      note: form.note.trim(),
      attachments,
      // ทีม (ช่างติดตั้ง / ทีมมีเดีย) — ฟอร์มรวม
      ...(isTeamCategory ? {
        team: form.team,
        mileage: {
          before: form.mileage.before === "" ? null : parseFloat(form.mileage.before),
          after: form.mileage.after === "" ? null : parseFloat(form.mileage.after),
          distance: distance || 0,
          rate: fuelRate || 0,
          fuelCost: fuelCost || 0,
          tollFee: parseFloat(form.mileage.tollFee) || 0,
          // foodCost เฉพาะช่างติดตั้ง
          ...(isInstaller ? { foodCost: parseFloat(form.mileage.foodCost) || 0 } : {}),
          otherCost: parseFloat(form.mileage.otherCost) || 0,
          total: mileageTotal || 0
        }
      } : {}),
      // OT
      ...(isOT ? {
        ot: {
          workers: form.ot.workers.trim(),
          count: parseFloat(form.ot.count) || 0,
          rate: parseFloat(form.ot.rate) || OT_DEFAULT_RATE,
          total: otTotal || 0
        }
      } : {})
    });

    setForm({
      date: todayStr(),
      shift: form.shift,
      category: CATEGORIES[0],
      description: "",
      amount: "",
      paymentMethod: PAYMENT_METHODS[0],
      note: "",
      team: "",
      mileage: { before: "", after: "", tollFee: "", foodCost: "", otherCost: "" },
      ot: { workers: "", count: "", rate: OT_DEFAULT_RATE }
    });
    setPendingFiles([]);
    setSubmitting(false);
  };

  const isXPayment = form.paymentMethod === X_PAYMENT;

  return (
    <div className="bg-white rounded-2xl border border-stone-200 p-3.5 sm:p-5 max-w-2xl mx-auto shadow-sm">
      <div className="flex items-start gap-3 mb-4 sm:mb-5">
        <div className="w-9 h-9 rounded-lg bg-emerald-50 text-emerald-700 grid place-items-center flex-shrink-0">
          <PlusCircle size={18} />
        </div>
        <div className="min-w-0">
          <h2 className="text-base font-semibold text-stone-900">เพิ่มรายการเบิก</h2>
          <p className="text-[12px] text-stone-500 mt-0.5 flex items-center gap-1">
            <Lock size={11} className="flex-shrink-0" />
            <span className="truncate">เมื่อบันทึกแล้วล็อก — ถ้าผิดให้ยกเลิกแล้วบันทึกใหม่</span>
          </p>
        </div>
      </div>

      <div className="space-y-3.5 sm:space-y-4">
        <div className="grid grid-cols-2 gap-3">
          <Field label="วันที่" error={errors.date}>
            <input
              type="date"
              value={form.date}
              onChange={e => update("date", e.target.value)}
              className="w-full px-3 py-2.5 border border-stone-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500"
            />
          </Field>
          <Field label="รอบเบิก">
            <div className="shift-toggle">
              {SHIFTS.map(s => {
                const isActive = form.shift === s;

                  ? (s === "เช้า" ? " active-morning" : " active-evening")
                  : "";
                return (
                  <button
                    key={s}
                    type="button"
                    onClick={() => update("shift", s)}
                    className={"shift-btn" + activeClass}
                  >
                    {s === "เช้า" ? <Sun size={13} /> : <Moon size={13} />}
                    <span>{s}</span>
                  </button>
                );
              })}
            </div>
          </Field>
        </div>

        <Field label="หมวดค่าใช้จ่าย">
          <select
            value={form.category}
            onChange={e => update("category", e.target.value)}
            className="w-full px-3 py-2.5 border border-stone-300 rounded-lg bg-white focus:outline-none focus:ring-2 focus:ring-emerald-500"
          >
            {CATEGORIES.map(c => <option key={c}>{c}</option>)}
          </select>
        </Field>

        {/* ─── ฟอร์มรวมสำหรับช่างติดตั้ง / ทีมมีเดีย ─── */}
        {isTeamCategory && (
          <div className={`${isInstaller ? "bg-orange-50 border-orange-200" : "bg-purple-50 border-purple-200"} border rounded-xl p-3 space-y-3`}>
            <p className={`text-[12px] font-semibold flex items-center gap-1 ${isInstaller ? "text-orange-900" : "text-purple-900"}`}>
              {isInstaller ? "🔧 รายละเอียดช่างติดตั้ง" : "🎥 รายละเอียดทีมมีเดีย"}
            </p>

            <Field label={isInstaller ? "ทีม" : "ผู้ไปงาน"}>
              <select
                value={form.team}
                onChange={e => update("team", e.target.value)}
                className={`w-full px-3 py-2 border rounded-lg text-sm bg-white focus:outline-none focus:ring-2 ${isInstaller ? "border-orange-300 focus:ring-orange-500" : "border-purple-300 focus:ring-purple-500"}`}
              >
                {teams.map(t => <option key={t}>{t}</option>)}
              </select>
            </Field>

            {/* ─── ค่าน้ำมัน (auto จากเลขไมล์) ─── */}
            <div className="bg-white rounded-lg p-3 border border-stone-200 space-y-2">
              <p className="text-[11.5px] font-semibold text-stone-700">⛽ ค่าน้ำมัน (จากเลขไมล์)</p>
              <div className="grid grid-cols-2 gap-2">
                <Field label="เลขไมล์ก่อนออก">

                    type="number" step="0.1" inputMode="decimal"
                    value={form.mileage.before}

                    placeholder="0"
                    className="w-full px-2 py-1.5 border border-stone-300 rounded-lg text-[13px] font-mono"
                  />
                </Field>
                <Field label="เลขไมล์หลังกลับ">
                  <input
                    type="number" step="0.1" inputMode="decimal"
                    value={form.mileage.after}
                    onChange={e => updateMileage("after", e.target.value)}
                    placeholder="0"
                    className="w-full px-2 py-1.5 border border-stone-300 rounded-lg text-[13px] font-mono"
                  />
                </Field>
              </div>
              <div className="grid grid-cols-3 gap-2 text-[11px]">
                <div className="bg-stone-50 px-2 py-1.5 rounded">
                  <p className="text-stone-500">ระยะทาง</p>
                  <p className="font-bold text-stone-900 font-mono">
                    {distance !== null ? `${distance.toFixed(1)} กม.` : "—"}
                  </p>
                </div>
                <div className="bg-stone-50 px-2 py-1.5 rounded">
                  <p className="text-stone-500">เรท (auto)</p>
                  <p className="font-bold text-stone-900 font-mono">
                    {fuelRate !== null ? `฿${fuelRate}/กม.` : "—"}
                  </p>
                </div>
                <div className="bg-stone-50 px-2 py-1.5 rounded">
                  <p className="text-stone-500">ค่าน้ำมัน</p>
                  <p className="font-bold text-stone-900 font-mono">
                    {fuelCost > 0 ? `฿${fmt(fuelCost)}` : "—"}
                  </p>
                </div>
              </div>
              <p className="text-[10.5px] text-stone-500">
                * ≤120 กม. = 6 บ./กม. · {">"}120 กม. = 5 บ./กม. — ถ้าไม่ได้ใช้รถ ปล่อยช่องเลขไมล์ว่างได้
              </p>

            {/* ─── ค่าใช้จ่ายอื่นในรอบ ─── */}

              <Field label="ค่าทางด่วน">

                  placeholder="0"
                  className="w-full px-2 py-1.5 border border-stone-300 rounded-lg text-[13px] font-mono"

              {isInstaller && (

                  <input
                    type="number" step="0.01" inputMode="decimal"
                    value={form.mileage.foodCost}
                    onChange={e => updateMileage("foodCost", e.target.value)}

                    className="w-full px-2 py-1.5 border border-stone-300 rounded-lg text-[13px] font-mono"
                  />
                </Field>
              )}
              <Field label={isInstaller ? "ค่าใช้จ่ายอื่น ๆ ในทีม" : "ค่าใช้จ่ายอื่น ๆ"}>
                <input
                  type="number" step="0.01" inputMode="decimal"
                  value={form.mileage.otherCost}
                  onChange={e => updateMileage("otherCost", e.target.value)}
                  placeholder="0"
                  className="w-full px-2 py-1.5 border border-stone-300 rounded-lg text-[13px] font-mono"
                />
              </Field>
            </div>

            {/* ยอดรวม */}
            <div className={`px-3 py-2.5 rounded-lg flex items-center justify-between ${isInstaller ? "bg-orange-100" : "bg-purple-100"}`}>
              <span className={`text-[12.5px] font-semibold ${isInstaller ? "text-orange-900" : "text-purple-900"}`}>

              </span>
              <span className={`text-[16px] font-bold font-mono ${isInstaller ? "text-orange-900" : "text-purple-900"}`}>
                {mileageTotal > 0 ? `฿${fmt(mileageTotal)}` : "฿0.00"}
              </span>
            </div>
            <p className="text-[10.5px] text-stone-500">
              * ยอดรวม = ค่าน้ำมัน + ค่าทางด่วน{isInstaller ? " + ค่าข้าว" : ""} + ค่าอื่น ๆ
            </p>
          </div>
        )}

        {/* ─── ฟิลด์เพิ่มเติมสำหรับ OT ─── */}
        {isOT && (
          <div className="bg-rose-50 border border-rose-200 rounded-xl p-3 space-y-3">
            <p className="text-[12px] font-semibold text-rose-900 flex items-center gap-1">
              ⏰ รายละเอียด OT
            </p>
            <Field label="รายชื่อคนทำ OT">
              <textarea
                value={form.ot.workers}
                onChange={e => updateOT("workers", e.target.value)}
                rows={2}
                placeholder="เช่น สมชาย, ประยุทธ์, สมศรี"
                className="w-full px-3 py-2 border border-rose-300 rounded-lg text-sm resize-none focus:outline-none focus:ring-2 focus:ring-rose-500"
              />
            </Field>
            <div className="grid grid-cols-2 gap-2">
              <Field label="จำนวนคน">
                <input
                  type="number" step="1" inputMode="numeric"
                  value={form.ot.count}
                  onChange={e => updateOT("count", e.target.value)}
                  placeholder="0"
                  className="w-full px-2 py-1.5 border border-rose-300 rounded-lg text-[13px] font-mono"
                />
              </Field>
              <Field label="เรทต่อคน (บาท)">
                <input
                  type="number" step="1" inputMode="numeric"
                  value={form.ot.rate}
                  onChange={e => updateOT("rate", e.target.value)}
                  className="w-full px-2 py-1.5 border border-rose-300 rounded-lg text-[13px] font-mono"
                />
              </Field>
            </div>
            <div className="bg-rose-100 px-2.5 py-2 rounded-lg flex items-center justify-between">
              <span className="text-[12px] font-semibold text-rose-900">ยอดรวม OT</span>
              <span className="text-[15px] font-bold text-rose-900 font-mono">
                {otTotal !== null ? `฿${fmt(otTotal)}` : "—"}
              </span>
            </div>
            <p className="text-[10.5px] text-stone-500">
              * ยอดรวม = จำนวนคน × เรทต่อคน — เติมในช่อง "จำนวนเงิน" อัตโนมัติ
            </p>
          </div>
        )}

        <Field
          label={isTeamCategory ? "หน้างาน / รายละเอียดงาน" : "ชื่อรายการ"}
          error={errors.description}
        >
          <input
            value={form.description}
            onChange={e => update("description", e.target.value)}
            placeholder={
              isInstaller ? "เช่น ติดตั้งบ้านลูกค้า A, ซ่อมหน้าร้าน B" :
              isMedia ? "เช่น ถ่ายงานลูกค้า A ที่นนทบุรี" :
              isOT ? "เช่น OT วันเสาร์" :
              "เช่น ซื้อนอต, จ้างรถส่งของ"
            }
            className="w-full px-3 py-2 border border-stone-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500"
          />
        </Field>

        <div className="grid grid-cols-2 gap-3">
          <Field label="จำนวนเงิน (บาท)" error={errors.amount}>
            <input
              type="number"
              step="0.01"
              inputMode="decimal"
              value={form.amount}
              onChange={e => update("amount", e.target.value)}
              placeholder="0.00"
              className="w-full px-3 py-2 border border-stone-300 rounded-lg text-sm font-mono focus:outline-none focus:ring-2 focus:ring-emerald-500"
            />
          </Field>
          <Field label="วิธีจ่ายเงิน">
            <select
              value={form.paymentMethod}
              onChange={e => update("paymentMethod", e.target.value)}
              className="w-full px-3 py-2 border border-stone-300 rounded-lg text-sm bg-white focus:outline-none focus:ring-2 focus:ring-emerald-500"
            >
              {PAYMENT_METHODS.map(p => <option key={p}>{p}</option>)}
            </select>
          </Field>
        </div>

        {isXPayment && (
          <div className="bg-stone-100 border border-stone-200 rounded-lg px-3 py-2.5 text-[12px] text-stone-700 flex items-start gap-2">
            <AlertCircle size={14} className="flex-shrink-0 mt-0.5 text-stone-500" />
            <span>รายการนี้พี่ X โอนเอง <b>ไม่นับรวมในยอดเบิก</b> — จะแสดงแยกในสรุป</span>
          </div>
        )}

        <Field label="หมายเหตุ (ไม่บังคับ)">
          <textarea
            value={form.note}
            onChange={e => update("note", e.target.value)}
            rows={2}
            placeholder="รายละเอียดเพิ่มเติม"
            className="w-full px-3 py-2 border border-stone-300 rounded-lg text-sm resize-none focus:outline-none focus:ring-2 focus:ring-emerald-500"
          />
        </Field>

        {/* ─── แนบรูปหลักฐาน ─── */}
        <div>
          <label className="block text-[12px] font-medium text-stone-700 mb-1">แนบรูปหลักฐาน (ถ้ามี)</label>
          <p className="text-[11px] text-stone-500 mb-2">
            เช่น สลิปโอน ใบเสร็จ ค่าทางด่วน รูปของที่ซื้อ — รองรับ JPG / PNG / PDF
          </p>
          <label className="flex items-center justify-center gap-2 px-3 py-2.5 border-2 border-dashed border-stone-300 rounded-lg text-sm text-stone-600 hover:border-emerald-500 hover:bg-emerald-50/30 cursor-pointer transition">
            <Paperclip size={15} />
            เลือกไฟล์...
            <input
              type="file"
              accept="image/jpeg,image/png,application/pdf"
              multiple
              onChange={handleFilePick}
              className="sr-only"
            />
          </label>

          {pendingFiles.length > 0 && (
            <div className="mt-2 space-y-1.5">
              {pendingFiles.map((file, i) => (
                <div key={i} className="flex items-center gap-2 bg-stone-50 border border-stone-200 px-2.5 py-1.5 rounded-lg">
                  {file.type === 'application/pdf'
                    ? <FileText size={14} className="text-red-600 flex-shrink-0" />
                    : <ImageIcon size={14} className="text-emerald-600 flex-shrink-0" />}
                  <span className="text-[12px] text-stone-700 flex-1 truncate">{file.name}</span>
                  <span className="text-[10.5px] text-stone-400 flex-shrink-0">{(file.size / 1024).toFixed(0)} KB</span>
                  <button type="button" onClick={() => removePendingFile(i)} className="text-stone-400 hover:text-red-600 flex-shrink-0">
                    <X size={13} />
                  </button>
                </div>
              ))}
            </div>
          )}

          {filesError && (
            <p className="mt-2 text-[11px] text-red-600 flex items-start gap-1">
              <AlertCircle size={11} className="mt-0.5 flex-shrink-0" />
              <span>{filesError}</span>
            </p>
          )}
        </div>

        <button
          onClick={submit}
          disabled={submitting}
          className="w-full bg-emerald-700 hover:bg-emerald-800 active:bg-emerald-900 text-white py-3.5 rounded-xl font-semibold text-[15px] disabled:opacity-60 transition flex items-center justify-center gap-2 min-h-[50px]"
        >
          <Check size={18} />
          {submitting ? "กำลังบันทึก..." : "บันทึกรายการ"}
        </button>
      </div>
    </div>
  );
}

function Field({ label, error, children }) {
  return (
    <div>
      <label className="block text-[12px] font-medium text-stone-700 mb-1.5">{label}</label>
      {children}
      {error && <p className="text-[11px] text-red-600 mt-1 flex items-center gap-1"><AlertCircle size={11} />{error}</p>}
    </div>
  );
}

// ─── หน้าประวัติ ─────────────────────────────────────────────────
function HistoryView({ transactions, onCancel, onViewAtts }) {
  const [filters, setFilters] = useState({
    dateFrom: "", dateTo: "", shift: "ทั้งหมด", category: "ทั้งหมด",
    paymentMethod: "ทั้งหมด", showCancelled: "ทั้งหมด", search: ""
  });
  const [showFilters, setShowFilters] = useState(false);

  const filtered = useMemo(() => {
    return transactions
      .filter(t => {
        if (filters.dateFrom && t.date < filters.dateFrom) return false;
        if (filters.dateTo && t.date > filters.dateTo) return false;
        if (filters.shift !== "ทั้งหมด" && t.shift !== filters.shift) return false;
        if (filters.category !== "ทั้งหมด" && t.category !== filters.category) return false;
        if (filters.paymentMethod !== "ทั้งหมด" && t.paymentMethod !== filters.paymentMethod) return false;
        if (filters.showCancelled === "เฉพาะที่ใช้งาน" && t.cancelled) return false;
        if (filters.showCancelled === "เฉพาะที่ยกเลิก" && !t.cancelled) return false;
        if (filters.search) {
          const s = filters.search.toLowerCase();
          if (!(t.description || "").toLowerCase().includes(s) && !(t.note || "").toLowerCase().includes(s)) return false;
        }
        return true;
      })
      .sort((a, b) => b.createdAt - a.createdAt);
  }, [transactions, filters]);

  const activeTotal = filtered.filter(t => !t.cancelled && t.paymentMethod !== X_PAYMENT).reduce((s, t) => s + t.amount, 0);
  const update = (k, v) => setFilters(f => ({ ...f, [k]: v }));
  const reset = () => setFilters({
    dateFrom: "", dateTo: "", shift: "ทั้งหมด", category: "ทั้งหมด",
    paymentMethod: "ทั้งหมด", showCancelled: "ทั้งหมด", search: ""
  });

  const activeFilterCount = [
    filters.dateFrom, filters.dateTo,
    filters.shift !== "ทั้งหมด" ? filters.shift : "",
    filters.category !== "ทั้งหมด" ? filters.category : "",
    filters.paymentMethod !== "ทั้งหมด" ? filters.paymentMethod : "",
    filters.showCancelled !== "ทั้งหมด" ? filters.showCancelled : ""
  ].filter(Boolean).length;

  return (
    <div className="space-y-3">
      <div className="bg-white rounded-2xl border border-stone-200 p-3.5 shadow-sm">
        <div className="relative mb-2">
          <Search size={15} className="absolute left-3 top-1/2 -translate-y-1/2 text-stone-400" />
          <input
            value={filters.search}
            onChange={e => update("search", e.target.value)}
            placeholder="ค้นหาจากชื่อรายการ..."
            className="w-full pl-9 pr-3 py-2.5 border border-stone-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500"
          />
        </div>

        <button
          onClick={() => setShowFilters(!showFilters)}
          className="w-full flex items-center justify-between text-sm text-stone-700 hover:text-stone-900 py-1.5 px-1"
        >
          <span className="flex items-center gap-1.5">
            <Filter size={14} />
            ตัวกรอง
            {activeFilterCount > 0 && (
              <span className="bg-emerald-700 text-white text-[10px] px-1.5 py-0.5 rounded-full font-semibold">{activeFilterCount}</span>
            )}
          </span>
          <ChevronDown size={16} className={`transition ${showFilters ? "rotate-180" : ""}`} />
        </button>

        {showFilters && (
          <div className="mt-2 pt-3 border-t border-stone-200 space-y-2.5">
            <div className="grid grid-cols-2 gap-2">
              <FilterField label="ตั้งแต่วันที่">
                <input type="date" value={filters.dateFrom} onChange={e => update("dateFrom", e.target.value)}
                  className="w-full px-2 py-1.5 border border-stone-300 rounded text-[13px]" />
              </FilterField>
              <FilterField label="ถึงวันที่">
                <input type="date" value={filters.dateTo} onChange={e => update("dateTo", e.target.value)}
                  className="w-full px-2 py-1.5 border border-stone-300 rounded text-[13px]" />
              </FilterField>
            </div>
            <div className="grid grid-cols-2 gap-2">
              <FilterField label="รอบเบิก">
                <select value={filters.shift} onChange={e => update("shift", e.target.value)}
                  className="w-full px-2 py-1.5 border border-stone-300 rounded text-[13px] bg-white">
                  <option>ทั้งหมด</option>
                  {SHIFTS.map(s => <option key={s}>{s}</option>)}
                </select>
              </FilterField>
              <FilterField label="แสดง">
                <select value={filters.showCancelled} onChange={e => update("showCancelled", e.target.value)}
                  className="w-full px-2 py-1.5 border border-stone-300 rounded text-[13px] bg-white">
                  <option>ทั้งหมด</option>
                  <option>เฉพาะที่ใช้งาน</option>
                  <option>เฉพาะที่ยกเลิก</option>
                </select>
              </FilterField>
            </div>
            <FilterField label="หมวดค่าใช้จ่าย">
              <select value={filters.category} onChange={e => update("category", e.target.value)}
                className="w-full px-2 py-1.5 border border-stone-300 rounded text-[13px] bg-white">
                <option>ทั้งหมด</option>
                {CATEGORIES.map(c => <option key={c}>{c}</option>)}
              </select>
            </FilterField>
            <FilterField label="วิธีจ่ายเงิน">
              <select value={filters.paymentMethod} onChange={e => update("paymentMethod", e.target.value)}
                className="w-full px-2 py-1.5 border border-stone-300 rounded text-[13px] bg-white">
                <option>ทั้งหมด</option>
                {PAYMENT_METHODS.map(p => <option key={p}>{p}</option>)}
              </select>
            </FilterField>
            <button onClick={reset}
              className="text-[12px] text-stone-500 hover:text-stone-900 flex items-center gap-1 pt-1">
              <RefreshCw size={11} />ล้างตัวกรองทั้งหมด
            </button>
          </div>
        )}
      </div>

      <div className="bg-gradient-to-r from-emerald-700 to-emerald-800 rounded-2xl p-4 flex items-center justify-between text-white shadow-sm">
        <div>
          <p className="text-[11px] opacity-90 font-medium">พบรายการ</p>
          <p className="text-base font-semibold">{fmtInt(filtered.length)} รายการ</p>
        </div>
        <div className="text-right">
          <p className="text-[11px] opacity-90 font-medium">ยอดเบิก (ไม่รวมพี่ X โอนเอง / ยกเลิก)</p>
          <p className="text-lg font-bold">฿{fmt(activeTotal)}</p>
        </div>
      </div>

      {filtered.length === 0 ? (
        <div className="bg-white rounded-2xl border border-stone-200 p-12 text-center">
          <Receipt size={36} className="mx-auto text-stone-300 mb-2" />
          <p className="text-sm text-stone-500">ไม่พบรายการ</p>
        </div>
      ) : (
        <div className="space-y-2">
          {filtered.map(t => (
            <TransactionCard key={t.id} tx={t} onCancel={onCancel} onViewAtts={onViewAtts} />
          ))}
        </div>
      )}
    </div>
  );
}

function FilterField({ label, children }) {
  return (
    <div>
      <label className="block text-[10.5px] font-medium text-stone-600 mb-1 uppercase tracking-wide">{label}</label>
      {children}
    </div>
  );
}

function TransactionCard({ tx, onCancel, onViewAtts, readOnly = false }) {
  const [confirming, setConfirming] = useState(false);
  const isX = tx.paymentMethod === X_PAYMENT;
  const isCancelled = tx.cancelled;
  const hasAtts = tx.attachments && tx.attachments.length > 0;
  const isInstaller = tx.category === INSTALLER_CATEGORY;
  const isMedia = tx.category === MEDIA_CATEGORY;
  const isOT = tx.category === OT_CATEGORY;
  // รองรับ legacy field (mediaTeam, mediaSubType) ที่อาจยังอยู่ในข้อมูลเก่า
  const team = tx.team || tx.mediaTeam || "";
  const subType = tx.subType || tx.mediaSubType || "";

  const borderClass = isCancelled
    ? "border-stone-200 opacity-60"
    : isInstaller ? "border-orange-200 border-l-4"
    : isMedia ? "border-purple-200 border-l-4"
    : isOT ? "border-rose-200 border-l-4"
    : "border-stone-200";

  return (
    <div className={`bg-white rounded-2xl border p-3.5 shadow-sm ${borderClass}`}>
      <div className="flex items-start justify-between gap-3">
        <div className="flex-1 min-w-0">
          <div className="flex items-center gap-1.5 mb-1.5 flex-wrap">
            <span className={`text-[10px] px-1.5 py-0.5 rounded font-medium flex items-center gap-0.5 ${
              tx.shift === "เช้า" ? "bg-amber-100 text-amber-800" : "bg-indigo-100 text-indigo-800"
            }`}>
              {tx.shift === "เช้า" ? <Sun size={10} /> : <Moon size={10} />}
              {tx.shift}
            </span>
            <span className="text-[11px] text-stone-500">{tx.date}</span>
            {isInstaller && (
              <span className="text-[10px] px-1.5 py-0.5 rounded bg-orange-100 text-orange-800 font-semibold">
                🔧 ช่างติดตั้ง{team ? ` · ${team}` : ""}
              </span>
            )}
            {isMedia && (
              <span className="text-[10px] px-1.5 py-0.5 rounded bg-purple-100 text-purple-800 font-semibold">
                🎥 ทีมมีเดีย{team ? ` · ${team}` : ""}
              </span>
            )}
            {isOT && (
              <span className="text-[10px] px-1.5 py-0.5 rounded bg-rose-100 text-rose-800 font-semibold">
                ⏰ OT
              </span>
            )}
            {isX && (
              <span className="text-[10px] px-1.5 py-0.5 rounded bg-stone-200 text-stone-700 font-medium">พี่ X โอนเอง</span>
            )}
            {isCancelled && (
              <span className="text-[10px] px-1.5 py-0.5 rounded bg-red-100 text-red-700 font-medium flex items-center gap-0.5">
                <Ban size={10} />ยกเลิก
              </span>
            )}
            {hasAtts && (
              <button
                onClick={() => onViewAtts && onViewAtts(tx.attachments)}
                className="text-[10px] px-1.5 py-0.5 rounded bg-emerald-50 text-emerald-700 font-medium flex items-center gap-0.5 hover:bg-emerald-100 transition"
              >
                <Paperclip size={10} />
                หลักฐาน {tx.attachments.length}
              </button>
            )}
          </div>
          <p className={`text-[14px] font-medium text-stone-900 ${isCancelled ? "line-through" : ""}`}>
            {tx.description}
          </p>
          {tx.note && <p className="text-[11.5px] text-stone-500 mt-0.5">{tx.note}</p>}

          {/* รายละเอียดทีม (ช่างติดตั้ง / ทีมมีเดีย) — แสดง breakdown จาก mileage */}
          {(isInstaller || isMedia) && (tx.mileage || subType) && (
            <div className="mt-1.5 flex items-center gap-1 text-[11px] flex-wrap">
              {/* legacy subType (สำหรับข้อมูลเก่า) */}
              {!tx.mileage && subType && (
                <span className={`px-1.5 py-0.5 rounded font-medium ${isInstaller ? "bg-orange-50 text-orange-700" : "bg-purple-50 text-purple-700"}`}>
                  {subType}
                </span>
              )}
              {/* schema ใหม่: breakdown จาก mileage */}
              {tx.mileage && (
                <>
                  {tx.mileage.distance > 0 && (
                    <span className="text-stone-500 font-mono">
                      {tx.mileage.distance.toFixed(1)} กม. × ฿{tx.mileage.rate}
                    </span>
                  )}
                  {tx.mileage.fuelCost > 0 && (
                    <span className="bg-stone-50 text-stone-600 px-1.5 py-0.5 rounded font-mono">น้ำมัน ฿{fmt(tx.mileage.fuelCost)}</span>
                  )}
                  {tx.mileage.tollFee > 0 && (
                    <span className="bg-stone-50 text-stone-600 px-1.5 py-0.5 rounded font-mono">ด่วน ฿{fmt(tx.mileage.tollFee)}</span>
                  )}
                  {tx.mileage.foodCost > 0 && (
                    <span className="bg-stone-50 text-stone-600 px-1.5 py-0.5 rounded font-mono">ข้าว ฿{fmt(tx.mileage.foodCost)}</span>
                  )}
                  {tx.mileage.otherCost > 0 && (
                    <span className="bg-stone-50 text-stone-600 px-1.5 py-0.5 rounded font-mono">อื่นๆ ฿{fmt(tx.mileage.otherCost)}</span>
                  )}
                </>
              )}
            </div>
          )}

          {/* รายละเอียด OT */}
          {isOT && tx.ot && (
            <div className="mt-1.5 flex items-center gap-1.5 text-[11px] flex-wrap">
              <span className="bg-rose-50 text-rose-700 px-1.5 py-0.5 rounded font-medium font-mono">
                {tx.ot.count} คน × ฿{tx.ot.rate}
              </span>
              {tx.ot.workers && (
                <span className="text-stone-500 truncate">{tx.ot.workers}</span>
              )}
            </div>
          )}

          <div className="flex items-center gap-1.5 mt-1.5 text-[11px] text-stone-500 flex-wrap">
            <span className="bg-stone-100 px-1.5 py-0.5 rounded">{tx.category}</span>
            <span className="bg-stone-100 px-1.5 py-0.5 rounded">{tx.paymentMethod}</span>
          </div>
        </div>
        <div className="text-right flex-shrink-0">
          <p className={`text-base font-bold ${isX ? "text-stone-500" : "text-stone-900"} ${isCancelled ? "line-through" : ""}`}>
            ฿{fmt(tx.amount)}
          </p>
        </div>
      </div>

      {!readOnly && !isCancelled && (
        <div className="mt-3 pt-2.5 border-t border-stone-100 flex flex-wrap gap-1.5">
          {confirming ? (
            <>
              <span className="text-[11.5px] text-red-700 font-medium px-1 py-1 flex items-center gap-1">
                <AlertCircle size={12} />ยืนยันยกเลิก?
              </span>
              <button onClick={() => { onCancel(tx.id); setConfirming(false); }}
                className="px-3 py-1 bg-red-600 hover:bg-red-700 text-white rounded text-[11.5px] font-medium">
                ใช่ ยกเลิก
              </button>
              <button onClick={() => setConfirming(false)}
                className="px-3 py-1 bg-stone-100 hover:bg-stone-200 text-stone-700 rounded text-[11.5px] font-medium">
                ไม่
              </button>
            </>
          ) : (
            <button onClick={() => setConfirming(true)}
              className="px-2.5 py-1 bg-stone-100 hover:bg-red-100 hover:text-red-700 text-stone-600 rounded text-[11.5px] font-medium flex items-center gap-1">
              <Ban size={11} />ยกเลิกรายการ
            </button>
          )}
        </div>
      )}

      {isCancelled && tx.cancelledAt && (
        <p className="mt-2 text-[10.5px] text-stone-400">
          ยกเลิกเมื่อ {new Date(tx.cancelledAt).toLocaleString("th-TH")}
        </p>
      )}
    </div>
  );
}

// ─── หน้าสรุป — โหมดเดียว, ปุ่มเดียวสร้างรูป 2 แบบ ─────────────
//   หน้านี้: พี่ X เปิดดูยอด + พี่ญกดปุ่มเดียวได้รูปสรุปครบ
//   รูปที่ได้: (1) รูปยอดรวม (2) รูปรายละเอียด (อาจหลายหน้า)
function SummaryView({ transactions, onShowImage, onViewAtts }) {
  const [dateMode, setDateMode] = useState("day");
  const [date, setDate] = useState(todayStr());
  const [from, setFrom] = useState(() => {
    const d = new Date();
    d.setDate(d.getDate() - 7);
    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
  });
  const [to, setTo] = useState(todayStr());
  const [generating, setGenerating] = useState(false);

  const summary = useMemo(() => {
    if (dateMode === "day") return computeSummary(transactions, t => t.date === date);
    return computeSummary(transactions, t => t.date >= from && t.date <= to);
  }, [transactions, dateMode, date, from, to]);

  const teamSum = useMemo(() => computeTeamSummary(summary.yItems), [summary]);

  const morningItems = useMemo(() => summary.items
    .filter(t => t.shift === "เช้า" && t.paymentMethod !== X_PAYMENT)
    .sort((a, b) => a.createdAt - b.createdAt), [summary.items]);
  const eveningItems = useMemo(() => summary.items
    .filter(t => t.shift === "เย็น" && t.paymentMethod !== X_PAYMENT)
    .sort((a, b) => a.createdAt - b.createdAt), [summary.items]);
  const xItems = useMemo(() => summary.items
    .filter(t => t.paymentMethod === X_PAYMENT)
    .sort((a, b) => a.createdAt - b.createdAt), [summary.items]);

  const breakdown = useMemo(() => {
    let cash = 0, transfer = 0;
    summary.yItems.forEach(t => {
      if (t.paymentMethod === "จ่ายเงินสด") cash += t.amount;
      else if (t.paymentMethod === "โอน/สแกน") transfer += t.amount;
    });
    return { cash, transfer };
  }, [summary]);

  const byCategory = useMemo(() => {
    const map = {};
    summary.yItems.forEach(t => { map[t.category] = (map[t.category] || 0) + t.amount; });
    return Object.entries(map)
      .map(([name, value]) => ({ name, value }))
      .filter(c => c.value > 0)
      .sort((a, b) => b.value - a.value);
  }, [summary.yItems]);

  const dateLabel = dateMode === "day"
    ? formatThaiDate(date)
    : `${formatThaiDate(from)} – ${formatThaiDate(to)}`;
  const fileLabel = dateMode === "day" ? date : `${from}_ถึง_${to}`;

  // กดปุ่มเดียว — สร้างรูปทั้ง 2 แบบเรียงต่อกันใน modal
  const handleDownloadAll = async () => {
    setGenerating(true);
    try {
      const overviewCanvas = await renderOverviewImage(
        summary, dateLabel,
        dateMode === "day" ? "สรุปรายวัน" : "สรุปช่วงวันที่",
        { breakdown, byCategory }
      );
      const allItems = [...morningItems, ...eveningItems, ...xItems];
      const detailCanvases = allItems.length > 0
        ? await renderDetailImages(
            summary, allItems, dateLabel,
            dateMode === "day" ? "รายละเอียดรายวัน" : "รายละเอียดช่วงวันที่"
          )
        : [];
      const all = [
        { canvas: overviewCanvas, name: `สรุปยอดรวม_${fileLabel}.png`, label: "ยอดรวม" },
        ...detailCanvases.map((c, i) => ({
          canvas: c,
          name: detailCanvases.length > 1
            ? `รายละเอียด_${fileLabel}_หน้า${i + 1}.png`
            : `รายละเอียด_${fileLabel}.png`,
          label: detailCanvases.length > 1 ? `รายละเอียด ${i + 1}/${detailCanvases.length}` : "รายละเอียด"
        }))
      ];
      onShowImage(all);
    } finally {
      setGenerating(false);
    }
  };

  return (
    <div className="space-y-3">
      {/* ─── Filter วันที่ ─── */}
      <div className="bg-white rounded-2xl border border-stone-200 p-3.5 shadow-sm">
        <div className="grid grid-cols-2 gap-1 bg-stone-100 p-1 rounded-lg mb-3">
          <button onClick={() => setDateMode("day")}
            className={`py-1.5 rounded-md text-[13px] font-medium transition ${
              dateMode === "day" ? "bg-white text-emerald-700 shadow-sm" : "text-stone-600"
            }`}>
            รายวัน
          </button>
          <button onClick={() => setDateMode("range")}
            className={`py-1.5 rounded-md text-[13px] font-medium transition ${
              dateMode === "range" ? "bg-white text-emerald-700 shadow-sm" : "text-stone-600"
            }`}>
            ช่วงวันที่
          </button>
        </div>
        {dateMode === "day" ? (
          <input type="date" value={date} onChange={e => setDate(e.target.value)}
            className="w-full px-3 py-2 border border-stone-300 rounded-lg text-sm" />
        ) : (
          <div className="grid grid-cols-2 gap-2">
            <input type="date" value={from} onChange={e => setFrom(e.target.value)}
              className="w-full px-2 py-2 border border-stone-300 rounded-lg text-[13px]" />
            <input type="date" value={to} onChange={e => setTo(e.target.value)}
              className="w-full px-2 py-2 border border-stone-300 rounded-lg text-[13px]" />
          </div>
        )}
      </div>

      {/* ─── ยอดเบิกรวมสุทธิ — ตัวใหญ่สุด ─── */}
      <div className="bg-gradient-to-br from-emerald-700 to-emerald-800 text-white rounded-2xl p-5 sm:p-6 shadow-md">
        <p className="text-[11px] opacity-80 font-medium uppercase tracking-wide">{dateLabel}</p>
        <p className="text-[12px] opacity-90 mt-3">ยอดเบิกรวมสุทธิ</p>
        <p className="text-5xl font-bold mt-1 tracking-tight">฿{fmt(summary.total)}</p>
        <p className="text-[12px] opacity-80 mt-2">
          {fmtInt(summary.yCount)} รายการ
          {summary.xCount > 0 && <span className="opacity-70"> · ไม่รวมพี่ X โอนเอง</span>}
        </p>
      </div>

      {/* ─── เช้า / เย็น ─── */}
      <div className="grid grid-cols-2 gap-2">
        <div className="bg-white border border-stone-200 rounded-xl p-3.5">
          <p className="text-[11px] text-stone-500 font-medium flex items-center gap-1">
            <Sun size={12} className="text-amber-600" />รวมรอบเช้า
          </p>
          <p className="text-xl font-bold text-stone-900 mt-0.5">฿{fmt(summary.morning)}</p>
          <p className="text-[10.5px] text-stone-400 mt-0.5">{fmtInt(morningItems.length)} รายการ</p>
        </div>
        <div className="bg-white border border-stone-200 rounded-xl p-3.5">
          <p className="text-[11px] text-stone-500 font-medium flex items-center gap-1">
            <Moon size={12} className="text-indigo-600" />รวมรอบเย็น
          </p>
          <p className="text-xl font-bold text-stone-900 mt-0.5">฿{fmt(summary.evening)}</p>
          <p className="text-[10.5px] text-stone-400 mt-0.5">{fmtInt(eveningItems.length)} รายการ</p>
        </div>
      </div>

      {/* ─── พี่ X โอนเอง ─── */}
      {summary.xTotal > 0 && (
        <div className="bg-stone-100 border border-stone-200 rounded-xl px-3.5 py-3 flex items-center justify-between">
          <div>
            <p className="text-[11.5px] text-stone-700 font-medium flex items-center gap-1">
              <User size={12} />พี่ X โอนเอง
            </p>
            <p className="text-[10.5px] text-stone-500 mt-0.5">
              {fmtInt(summary.xCount)} รายการ · ไม่รวมในยอดสุทธิ
            </p>
          </div>
          <p className="text-base font-bold text-stone-700">฿{fmt(summary.xTotal)}</p>
        </div>
      )}

      {/* ─── ปุ่มเดียว ดาวน์โหลดรูปสรุป ─── */}
      <button
        onClick={handleDownloadAll}
        disabled={summary.count === 0 || generating}
        className="w-full bg-stone-900 hover:bg-stone-800 disabled:bg-stone-300 disabled:cursor-not-allowed text-white py-3.5 rounded-2xl font-semibold text-[15px] flex items-center justify-center gap-2 shadow-sm min-h-[50px]"
      >
        <Download size={18} />
        {generating ? "กำลังสร้างรูป..." : "ดาวน์โหลดรูปสรุป"}
      </button>
      <p className="text-[10.5px] text-stone-400 text-center -mt-1">
        ได้ทั้งรูปยอดรวม + รูปรายละเอียดในครั้งเดียว
        {summary.count > 12 && " (รูปรายละเอียดอาจแบ่งหลายหน้า)"}
      </p>

      {/* ─── สรุปวิธีจ่าย ─── */}
      {(breakdown.cash > 0 || breakdown.transfer > 0) && (
        <div className="bg-white rounded-xl border border-stone-200 p-4">
          <h3 className="text-[11px] font-semibold text-stone-500 mb-2 uppercase tracking-wide">สรุปตามวิธีจ่าย</h3>
          <div className="space-y-1.5 text-[13px]">
            {breakdown.cash > 0 && (
              <div className="flex justify-between py-0.5">
                <span className="text-stone-700">จ่ายเงินสด</span>
                <span className="font-medium text-stone-900">฿{fmt(breakdown.cash)}</span>
              </div>
            )}
            {breakdown.transfer > 0 && (
              <div className="flex justify-between py-0.5">
                <span className="text-stone-700">โอน/สแกน</span>
                <span className="font-medium text-stone-900">฿{fmt(breakdown.transfer)}</span>
              </div>
            )}
            <div className="flex justify-between py-1.5 mt-1 border-t border-stone-200">
              <span className="font-semibold text-stone-900">รวมสุทธิ</span>
              <span className="font-semibold text-emerald-700">฿{fmt(summary.total)}</span>
            </div>
            {summary.xTotal > 0 && (
              <div className="flex justify-between py-0.5 text-[12px] text-stone-500">
                <span>พี่ X โอนเอง <span className="text-stone-400">(แยก)</span></span>
                <span>฿{fmt(summary.xTotal)}</span>
              </div>
            )}
          </div>
        </div>
      )}

      {/* ─── สรุปหมวด ─── */}
      {byCategory.length > 0 && (
        <div className="bg-white rounded-xl border border-stone-200 p-4">
          <h3 className="text-[11px] font-semibold text-stone-500 mb-2 uppercase tracking-wide">สรุปตามหมวด</h3>
          <div className="space-y-1 text-[13px]">
            {byCategory.map(c => {
              const pct = summary.total > 0 ? (c.value / summary.total) * 100 : 0;
              return (
                <div key={c.name} className="flex justify-between py-0.5">
                  <span className="text-stone-700">{c.name}</span>
                  <span className="font-medium text-stone-900">
                    ฿{fmt(c.value)} <span className="text-stone-400 text-[11.5px]">({pct.toFixed(0)}%)</span>
                  </span>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* ─── รายการแยกรอบ ─── */}
      {summary.count === 0 ? (
        <div className="bg-white rounded-2xl border border-stone-200 p-12 text-center">
          <Receipt size={36} className="mx-auto text-stone-300 mb-2" />
          <p className="text-sm text-stone-500">ไม่มีรายการในช่วงที่เลือก</p>
        </div>
      ) : (
        <div className="space-y-3 pt-1">
          {morningItems.length > 0 && (
            <div>
              <h3 className="text-[12px] font-semibold text-stone-700 mb-2 px-1 flex items-center gap-1">
                <Sun size={12} className="text-amber-600" />รอบเช้า
                <span className="text-stone-400 font-normal">({fmtInt(morningItems.length)})</span>
              </h3>
              <div className="space-y-2">
                {morningItems.map(t => <TransactionCard key={t.id} tx={t} readOnly onViewAtts={onViewAtts} />)}
              </div>
            </div>
          )}
          {eveningItems.length > 0 && (
            <div>
              <h3 className="text-[12px] font-semibold text-stone-700 mb-2 px-1 flex items-center gap-1">
                <Moon size={12} className="text-indigo-600" />รอบเย็น
                <span className="text-stone-400 font-normal">({fmtInt(eveningItems.length)})</span>
              </h3>
              <div className="space-y-2">
                {eveningItems.map(t => <TransactionCard key={t.id} tx={t} readOnly onViewAtts={onViewAtts} />)}
              </div>
            </div>
          )}
          {xItems.length > 0 && (
            <div>
              <h3 className="text-[12px] font-semibold text-stone-600 mb-2 px-1 flex items-center gap-1">
                <User size={12} />พี่ X โอนเอง
                <span className="text-stone-400 font-normal">({fmtInt(xItems.length)}) — ไม่รวมในยอดสุทธิ</span>
              </h3>
              <div className="space-y-2">
                {xItems.map(t => <TransactionCard key={t.id} tx={t} readOnly onViewAtts={onViewAtts} />)}
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}


function TeamBreakdownCard({ ms, kind }) {
  const isInstaller = kind === 'installer';
  const total = isInstaller ? ms.installerTotal : ms.mediaTotal;
  const count = isInstaller ? ms.installerCount : ms.mediaCount;
  const sub = isInstaller ? ms.installerSub : ms.mediaSub;
  const distance = isInstaller ? ms.installerDistance : ms.mediaDistance;
  if (count === 0) return null;

  const cls = isInstaller
    ? { bg: "bg-orange-50 border-orange-200", title: "text-orange-900",
        sub: "text-orange-700", value: "text-orange-900", border: "border-orange-200" }
    : { bg: "bg-purple-50 border-purple-200", title: "text-purple-900",
        sub: "text-purple-700", value: "text-purple-900", border: "border-purple-200" };

  return (
    <div className={`${cls.bg} border rounded-xl p-4`}>
      <div className="flex items-center justify-between mb-2">
        <p className={`text-[12px] font-semibold flex items-center gap-1 ${cls.title}`}>
          {isInstaller ? "🔧 ช่างติดตั้ง" : "🎥 ทีมมีเดีย"}
        </p>
        <p className={`text-[10.5px] ${cls.sub}`}>{fmtInt(count)} รายการ</p>
      </div>
      <p className={`text-2xl font-bold ${cls.value}`}>฿{fmt(total)}</p>
      <div className={`grid grid-cols-4 gap-2 mt-3 pt-3 border-t ${cls.border} text-[11.5px]`}>
        <div>
          <p className={cls.sub}>ค่าน้ำมัน</p>
          <p className={`font-semibold ${cls.value}`}>฿{fmt(sub.fuel)}</p>
        </div>
        <div>
          <p className={cls.sub}>ค่าทางด่วน</p>
          <p className={`font-semibold ${cls.value}`}>฿{fmt(sub.toll)}</p>
        </div>
        {isInstaller && (
          <div>
            <p className={cls.sub}>ค่าข้าว</p>
            <p className={`font-semibold ${cls.value}`}>฿{fmt(sub.food)}</p>
          </div>
        )}
        <div>
          <p className={cls.sub}>{isInstaller ? "อื่น ๆ" : "อื่น ๆ"}</p>
          <p className={`font-semibold ${cls.value}`}>฿{fmt(sub.other)}</p>
        </div>
      </div>
      {distance > 0 && (
        <p className={`text-[11px] mt-2 font-medium ${cls.sub}`}>
          ระยะทางรวม {distance.toFixed(1)} กม.
        </p>
      )}
    </div>
  );
}
