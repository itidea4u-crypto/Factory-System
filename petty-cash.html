// ─── Helper: load fonts ก่อนวาด canvas ──────────────────────────
async function loadCanvasFonts() {
  if (!document.fonts) return;
  try {
    await Promise.all([
      document.fonts.load('700 140px "IBM Plex Sans Thai"'),
      document.fonts.load('700 96px "IBM Plex Sans Thai"'),
      document.fonts.load('700 48px "IBM Plex Sans Thai"'),
      document.fonts.load('700 36px "IBM Plex Sans Thai"'),
      document.fonts.load('700 30px "IBM Plex Sans Thai"'),
      document.fonts.load('700 24px "IBM Plex Sans Thai"'),
      document.fonts.load('600 30px "IBM Plex Sans Thai"'),
      document.fonts.load('600 26px "IBM Plex Sans Thai"'),
      document.fonts.load('600 22px "IBM Plex Sans Thai"'),
      document.fonts.load('500 22px "IBM Plex Sans Thai"'),
      document.fonts.load('500 20px "IBM Plex Sans Thai"'),
      document.fonts.load('400 18px "IBM Plex Sans Thai"'),
      document.fonts.load('400 16px "IBM Plex Sans Thai"')
    ]);
  } catch (e) { /* ignore */ }
}

const CANVAS_W = 1080;
const CANVAS_PAD = 70;
const CANVAS_FONT = '"IBM Plex Sans Thai", "Sarabun", system-ui, sans-serif';

// helper: round rect (fallback ถ้า browser เก่า)
function roundRect(ctx, x, y, w, h, r) {
  if (ctx.roundRect) {
    ctx.beginPath();
    ctx.roundRect(x, y, w, h, r);
  } else {
    ctx.beginPath();
    ctx.rect(x, y, w, h);
  }
}

// ─── (1) renderOverviewImage — รูปยอดรวมสำหรับให้พี่ X เห็นยอดเร็ว ───
//   Layout (top → bottom):
//     1. หัวข้อ "สรุปยอดเบิกเงิน" + วันที่
//     2. ยอดเบิกรวมสุทธิ (ตัวใหญ่ที่สุด)
//     3. รวมรอบเช้า / รวมรอบเย็น / พี่ X (ถ้ามี)
//     4. สรุปตามวิธีจ่าย
//     5. สรุปตามหมวด
//     6. footer: จำนวนรายการ
async function renderOverviewImage(summary, dateLabel, subtitle, extra) {
  await loadCanvasFonts();

  const W = CANVAS_W;
  const padding = CANVAS_PAD;
  const FONT = CANVAS_FONT;

  // เตรียมข้อมูล
  const breakdown = (extra && extra.breakdown) || { cash: 0, transfer: 0 };
  const byCategory = ((extra && extra.byCategory) || []).filter(c => c.value > 0);

  // คำนวณความสูง
  const headerH = 250;
  const totalH = 280;
  const shiftH = 130;
  const xH = summary.xTotal > 0 ? 130 : 0;
  const paymentLines = (breakdown.cash > 0 ? 1 : 0) + (breakdown.transfer > 0 ? 1 : 0);
  const paymentH = paymentLines > 0 ? (90 + paymentLines * 38 + 50) : 0;
  const categoryH = byCategory.length > 0 ? (90 + byCategory.length * 38 + 30) : 0;
  const footerH = 100;

  const H = headerH + totalH + shiftH + xH + paymentH + categoryH + footerH;

  const canvas = document.createElement('canvas');
  canvas.width = W;
  canvas.height = H;
  const ctx = canvas.getContext('2d');

  // BG
  ctx.fillStyle = '#FAFAF9';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#047857';
  ctx.fillRect(0, 0, W, 8);

  // ═══ HEADER ═══
  let y = 90;
  ctx.fillStyle = '#0c4a3e';
  ctx.font = `700 48px ${FONT}`;
  ctx.fillText('สรุปยอดเบิกเงิน', padding, y);
  y += 50;

  ctx.fillStyle = '#78716c';
  ctx.font = `500 22px ${FONT}`;
  ctx.fillText(subtitle || '', padding, y);
  y += 35;

  ctx.fillStyle = '#1c1917';
  ctx.font = `600 30px ${FONT}`;
  ctx.fillText(dateLabel, padding, y);
  y += 50;

  // ═══ ยอดเบิกรวมสุทธิ — ตัวใหญ่สุด ═══
  // กล่องเขียวเข้ม
  ctx.fillStyle = '#064e3b';
  roundRect(ctx, padding, y, W - padding * 2, 240, 18);
  ctx.fill();

  ctx.fillStyle = '#10b981';
  ctx.fillRect(padding, y, W - padding * 2, 5);

  ctx.fillStyle = '#a7f3d0';
  ctx.font = `500 26px ${FONT}`;
  ctx.fillText('ยอดเบิกรวมสุทธิ', padding + 30, y + 60);

  ctx.fillStyle = '#ffffff';
  ctx.font = `700 110px ${FONT}`;
  ctx.fillText(`฿${fmt(summary.total)}`, padding + 30, y + 175);

  ctx.fillStyle = '#6ee7b7';
  ctx.font = `400 18px ${FONT}`;
  ctx.fillText(
    `${fmtInt(summary.yCount)} รายการ${summary.xCount > 0 ? ' · ไม่รวมพี่ X โอนเอง' : ''}`,
    padding + 30, y + 215
  );
  y += 280;

  // ═══ เช้า / เย็น 2 คอลัมน์ ═══
  const colW = (W - padding * 2 - 16) / 2;
  const drawShiftCol = (x, label, value, count, accentBg, accentColor) => {
    ctx.fillStyle = accentBg;
    roundRect(ctx, x, y, colW, 110, 14);
    ctx.fill();
    ctx.fillStyle = accentColor;
    ctx.fillRect(x, y, 5, 110);

    ctx.fillStyle = '#57534e';
    ctx.font = `500 22px ${FONT}`;
    ctx.fillText(label, x + 22, y + 38);

    ctx.fillStyle = '#1c1917';
    ctx.font = `700 36px ${FONT}`;
    ctx.fillText(`฿${fmt(value)}`, x + 22, y + 80);

    ctx.fillStyle = '#a8a29e';
    ctx.font = `400 16px ${FONT}`;
    ctx.fillText(`${count} รายการ`, x + 22, y + 100);
  };

  const morningCount = summary.yItems.filter(t => t.shift === 'เช้า').length;
  const eveningCount = summary.yItems.filter(t => t.shift === 'เย็น').length;
  drawShiftCol(padding, '☀ รวมรอบเช้า', summary.morning, morningCount, '#fef3c7', '#f59e0b');
  drawShiftCol(padding + colW + 16, '☾ รวมรอบเย็น', summary.evening, eveningCount, '#e0e7ff', '#6366f1');
  y += shiftH;

  // ═══ พี่ X โอนเอง ═══
  if (summary.xTotal > 0) {
    ctx.fillStyle = '#f5f5f4';
    roundRect(ctx, padding, y, W - padding * 2, 80, 14);
    ctx.fill();
    ctx.fillStyle = '#a8a29e';
    ctx.fillRect(padding, y, 5, 80);

    ctx.fillStyle = '#57534e';
    ctx.font = `500 22px ${FONT}`;
    ctx.fillText('พี่ X โอนเอง', padding + 22, y + 35);

    ctx.fillStyle = '#a8a29e';
    ctx.font = `400 16px ${FONT}`;
    ctx.fillText(`${fmtInt(summary.xCount)} รายการ · ไม่รวมในยอดเบิกสุทธิ`, padding + 22, y + 58);

    ctx.fillStyle = '#1c1917';
    ctx.font = `700 30px ${FONT}`;
    const xText = `฿${fmt(summary.xTotal)}`;
    const xW = ctx.measureText(xText).width;
    ctx.fillText(xText, W - padding - 22 - xW, y + 50);

    y += 90;

    // หมายเหตุเล็ก ๆ ใต้กล่องพี่ X
    ctx.fillStyle = '#a8a29e';
    ctx.font = `400 15px ${FONT}`;
    ctx.fillText('* พี่ X โอนเอง แสดงเพื่อบันทึกข้อมูล แต่ไม่รวมในยอดเบิกรวมสุทธิ', padding + 4, y + 12);
    y += 30;
  }

  // ═══ สรุปตามวิธีจ่าย ═══
  if (paymentLines > 0) {
    y += 30;
    ctx.strokeStyle = '#e7e5e4';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(padding, y);
    ctx.lineTo(W - padding, y);
    ctx.stroke();
    y += 30;

    ctx.fillStyle = '#1c1917';
    ctx.font = `700 24px ${FONT}`;
    ctx.fillText('สรุปตามวิธีจ่าย', padding, y);
    y += 38;

    if (breakdown.cash > 0) {
      ctx.fillStyle = '#57534e';
      ctx.font = `500 22px ${FONT}`;
      ctx.fillText('จ่ายเงินสด', padding + 8, y);

      ctx.fillStyle = '#1c1917';
      ctx.font = `600 22px ${FONT}`;
      const t = `฿${fmt(breakdown.cash)}`;
      const tW = ctx.measureText(t).width;
      ctx.fillText(t, W - padding - tW, y);
      y += 38;
    }
    if (breakdown.transfer > 0) {
      ctx.fillStyle = '#57534e';
      ctx.font = `500 22px ${FONT}`;
      ctx.fillText('โอน/สแกน', padding + 8, y);

      ctx.fillStyle = '#1c1917';
      ctx.font = `600 22px ${FONT}`;
      const t = `฿${fmt(breakdown.transfer)}`;
      const tW = ctx.measureText(t).width;
      ctx.fillText(t, W - padding - tW, y);
      y += 38;
    }
  }

  // ═══ สรุปตามหมวด ═══
  if (byCategory.length > 0) {
    y += 20;
    ctx.strokeStyle = '#e7e5e4';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(padding, y);
    ctx.lineTo(W - padding, y);
    ctx.stroke();
    y += 30;

    ctx.fillStyle = '#1c1917';
    ctx.font = `700 24px ${FONT}`;
    ctx.fillText('สรุปตามหมวด', padding, y);
    y += 38;

    byCategory.forEach(c => {
      const pct = summary.total > 0 ? (c.value / summary.total) * 100 : 0;
      ctx.fillStyle = '#57534e';
      ctx.font = `500 20px ${FONT}`;
      ctx.fillText(c.name, padding + 8, y);

      ctx.fillStyle = '#1c1917';
      ctx.font = `600 20px ${FONT}`;
      const valText = `฿${fmt(c.value)}`;
      const pctText = ` (${pct.toFixed(0)}%)`;
      const valW = ctx.measureText(valText).width;
      ctx.fillStyle = '#a8a29e';
      ctx.font = `400 18px ${FONT}`;
      const pctW = ctx.measureText(pctText).width;
      ctx.fillText(pctText, W - padding - pctW, y);

      ctx.fillStyle = '#1c1917';
      ctx.font = `600 20px ${FONT}`;
      ctx.fillText(valText, W - padding - pctW - valW, y);
      y += 38;
    });
  }

  // ═══ FOOTER: จำนวนรายการ ═══
  y = H - 60;
  ctx.fillStyle = '#a8a29e';
  ctx.font = `400 18px ${FONT}`;
  ctx.fillText(`รวมทั้งหมด ${fmtInt(summary.count)} รายการ`, padding, y);

  return canvas;
}

// ─── (2) renderDetailImages — รูปรายละเอียด แบ่งหน้าอัตโนมัติ ───
//   ส่ง array ของ canvases (1 หรือ มากกว่า)
//   แต่ละหน้าแสดง "รายละเอียดรายการเบิกเงิน — หน้า X/Y"
async function renderDetailImages(summary, allItems, dateLabel, subtitle) {
  if (allItems.length === 0) return [];

  await loadCanvasFonts();

  const W = CANVAS_W;
  const padding = CANVAS_PAD;
  const FONT = CANVAS_FONT;

  // คำนวณความสูงต่อ item
  // — ปกติ ~92px (3 บรรทัด: chip+desc, breakdown, footer)
  // — ถ้ามี mileage breakdown หรือ OT detail เพิ่ม +28px
  const itemHeight = (t) => {
    let h = 90;
    const isMedia = t.category === MEDIA_CATEGORY;
    const isInstaller = t.category === INSTALLER_CATEGORY;
    const isOT = t.category === OT_CATEGORY;
    if ((isMedia || isInstaller) && t.mileage) h += 28;
    if (isOT && t.ot) h += 28;
    if (t.note && t.note.length > 0) h += 24;
    return h;
  };

  // จัดกลุ่มตามรอบ
  const morning = allItems.filter(t => t.shift === 'เช้า' && t.paymentMethod !== X_PAYMENT);
  const evening = allItems.filter(t => t.shift === 'เย็น' && t.paymentMethod !== X_PAYMENT);
  const xList = allItems.filter(t => t.paymentMethod === X_PAYMENT);

  // สร้างลำดับเรนเดอร์: [{type:'header', label}, {type:'item', t}, ...]
  const seq = [];
  if (morning.length > 0) {
    seq.push({ type: 'header', label: '☀ รอบเช้า', count: morning.length, color: '#f59e0b' });
    morning.forEach(t => seq.push({ type: 'item', t, group: 'morning' }));
  }
  if (evening.length > 0) {
    seq.push({ type: 'header', label: '☾ รอบเย็น', count: evening.length, color: '#6366f1' });
    evening.forEach(t => seq.push({ type: 'item', t, group: 'evening' }));
  }
  if (xList.length > 0) {
    seq.push({ type: 'header', label: 'พี่ X โอนเอง', count: xList.length, color: '#a8a29e' });
    xList.forEach(t => seq.push({ type: 'item', t, group: 'x' }));
  }

  // คำนวณความสูง
  const HEADER_H_TOP = 230;       // page header (top of every page)
  const FOOTER_H = 100;            // page footer
  const GROUP_H = 78;              // กลุ่ม row header (เพิ่มจาก 60 → 78 เพื่อบรรทัดรองที่แยกออก)
  const ITEMS_PER_PAGE = 12;       // จำนวนรายการสูงสุดต่อหน้า

  // แบ่งหน้า — fixed item count
  const pages = [];
  let currentPage = [];
  let itemsOnPage = 0;

  for (const node of seq) {
    if (node.type === 'item' && itemsOnPage >= ITEMS_PER_PAGE) {
      // หน้าเต็ม → push หน้าเดิม + เริ่มหน้าใหม่
      pages.push(currentPage);
      currentPage = [];
      itemsOnPage = 0;
      // ตัดกลางกลุ่ม → ใส่ continuation header
      const lastHeader = [...seq].slice(0, seq.indexOf(node)).reverse().find(n => n.type === 'header');
      if (lastHeader) {
        currentPage.push({ ...lastHeader, label: lastHeader.label + ' (ต่อ)', isContinuation: true });
      }
    }
    currentPage.push(node);
    if (node.type === 'item') itemsOnPage++;
  }
  if (currentPage.length > 0) pages.push(currentPage);

  const totalPages = pages.length;

  // วาดทีละหน้า
  const canvases = [];
  for (let pageIdx = 0; pageIdx < pages.length; pageIdx++) {
    const pageNodes = pages[pageIdx];

    // คำนวณความสูงจริงของหน้านี้
    let pageContentH = 0;
    pageNodes.forEach(n => {
      pageContentH += n.type === 'header' ? GROUP_H : itemHeight(n.t);
    });
    const H = HEADER_H_TOP + pageContentH + FOOTER_H + 30;

    const canvas = document.createElement('canvas');
    canvas.width = W;
    canvas.height = H;
    const ctx = canvas.getContext('2d');

    // BG
    ctx.fillStyle = '#FAFAF9';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#047857';
    ctx.fillRect(0, 0, W, 8);

    // ═══ HEADER ═══
    let y = 80;
    ctx.fillStyle = '#0c4a3e';
    ctx.font = `700 36px ${FONT}`;
    ctx.fillText('รายละเอียดรายการเบิกเงิน', padding, y);
    y += 38;

    ctx.fillStyle = '#78716c';
    ctx.font = `500 20px ${FONT}`;
    ctx.fillText(subtitle || '', padding, y);
    y += 30;

    ctx.fillStyle = '#1c1917';
    ctx.font = `600 24px ${FONT}`;
    ctx.fillText(dateLabel, padding, y);
    y += 28;

    // page indicator
    if (totalPages > 1) {
      ctx.fillStyle = '#a8a29e';
      ctx.font = `500 18px ${FONT}`;
      const pageText = `หน้า ${pageIdx + 1}/${totalPages}`;
      const pageW = ctx.measureText(pageText).width;
      ctx.fillText(pageText, W - padding - pageW, y - 24);
    }

    // เส้นแบ่ง
    ctx.strokeStyle = '#e7e5e4';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(padding, y + 20);
    ctx.lineTo(W - padding, y + 20);
    ctx.stroke();
    y = HEADER_H_TOP;

    // ═══ ITEMS ═══
    pageNodes.forEach(node => {
      if (node.type === 'header') {
        // group header — title แล้วบรรทัดรองแสดงจำนวนรายการ
        ctx.fillStyle = node.color;
        ctx.fillRect(padding, y + 12, 5, 50);

        ctx.fillStyle = '#1c1917';
        ctx.font = `700 26px ${FONT}`;
        ctx.fillText(node.label, padding + 18, y + 32);

        ctx.fillStyle = '#a8a29e';
        ctx.font = `400 16px ${FONT}`;
        ctx.fillText(`${node.count} รายการ`, padding + 18, y + 58);

        y += GROUP_H;
      } else {
        // item
        const t = node.t;
        const isX = t.paymentMethod === X_PAYMENT;
        const isMedia = t.category === MEDIA_CATEGORY;
        const isInstaller = t.category === INSTALLER_CATEGORY;
        const isOT = t.category === OT_CATEGORY;
        const txTeam = t.team || t.mediaTeam || '';

        // bullet
        ctx.fillStyle = '#a8a29e';
        ctx.font = `500 22px ${FONT}`;
        ctx.fillText('•', padding + 16, y + 26);

        // หมวด + ทีม
        let categoryLine = t.category;
        if (isInstaller) categoryLine = `🔧 ช่างติดตั้ง${txTeam ? ` · ${txTeam}` : ''}`;
        else if (isMedia) categoryLine = `🎥 ทีมมีเดีย${txTeam ? ` · ${txTeam}` : ''}`;
        else if (isOT) categoryLine = '⏰ OT';

        ctx.fillStyle = isX ? '#78716c' : (
          isInstaller ? '#ea580c' : isMedia ? '#7c3aed' : isOT ? '#e11d48' : '#0c4a3e'
        );
        ctx.font = `600 18px ${FONT}`;
        ctx.fillText(categoryLine, padding + 38, y + 22);

        // amount (ขวาบน)
        ctx.fillStyle = isX ? '#78716c' : '#1c1917';
        ctx.font = `700 24px ${FONT}`;
        const amt = `฿${fmt(t.amount)}`;
        const amtW = ctx.measureText(amt).width;
        ctx.fillText(amt, W - padding - amtW, y + 24);

        // payment method (ขวาล่าง)
        ctx.fillStyle = '#a8a29e';
        ctx.font = `400 14px ${FONT}`;
        const pmW = ctx.measureText(t.paymentMethod).width;
        ctx.fillText(t.paymentMethod, W - padding - pmW, y + 44);

        // description
        ctx.fillStyle = isX ? '#78716c' : '#292524';
        ctx.font = `500 20px ${FONT}`;
        let desc = t.description || '';
        const maxDescW = W - padding * 2 - 280;
        if (ctx.measureText(desc).width > maxDescW) {
          while (ctx.measureText(desc + '...').width > maxDescW && desc.length > 0) {
            desc = desc.slice(0, -1);
          }
          desc += '...';
        }
        ctx.fillText(desc, padding + 38, y + 50);

        // attachment indicator
        if (t.attachments && t.attachments.length > 0) {
          const descW = ctx.measureText(desc).width;
          ctx.fillStyle = '#10b981';
          ctx.font = `600 14px ${FONT}`;
          ctx.fillText('📎 มีหลักฐาน', padding + 38 + descW + 12, y + 50);
        }

        let detailY = y + 78;

        // mileage breakdown
        if ((isMedia || isInstaller) && t.mileage) {
          ctx.fillStyle = '#a8a29e';
          ctx.font = `400 15px ${FONT}`;
          const m = t.mileage;
          const parts = [];
          if (m.distance > 0) parts.push(`${m.distance.toFixed(1)} กม. × ฿${m.rate}`);
          if (m.fuelCost > 0) parts.push(`น้ำมัน ฿${fmt(m.fuelCost)}`);
          if (m.tollFee > 0) parts.push(`ด่วน ฿${fmt(m.tollFee)}`);
          if (m.foodCost > 0) parts.push(`ข้าว ฿${fmt(m.foodCost)}`);
          if (m.otherCost > 0) parts.push(`อื่นๆ ฿${fmt(m.otherCost)}`);
          if (parts.length > 0) {
            ctx.fillText(parts.join(' · '), padding + 38, detailY);
            detailY += 22;
          }
        }

        // OT detail
        if (isOT && t.ot) {
          ctx.fillStyle = '#a8a29e';
          ctx.font = `400 15px ${FONT}`;
          const otLine = `${t.ot.count} คน × ฿${t.ot.rate}${t.ot.workers ? ` · ${t.ot.workers.length > 60 ? t.ot.workers.slice(0, 60) + '...' : t.ot.workers}` : ''}`;
          ctx.fillText(otLine, padding + 38, detailY);
          detailY += 22;
        }

        // note
        if (t.note && t.note.length > 0) {
          ctx.fillStyle = '#a8a29e';
          ctx.font = `400 14px ${FONT}`;
          let note = '“' + t.note + '”';
          const maxNoteW = W - padding * 2 - 80;
          if (ctx.measureText(note).width > maxNoteW) {
            while (ctx.measureText(note + '...').width > maxNoteW && note.length > 5) {
              note = note.slice(0, -1);
            }
            note += '..."';
          }
          ctx.fillText(note, padding + 38, detailY);
        }

        y += itemHeight(t);
      }
    });

    // ═══ FOOTER ═══
    const fy = H - 70;
    ctx.strokeStyle = '#e7e5e4';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(padding, fy - 20);
    ctx.lineTo(W - padding, fy - 20);
    ctx.stroke();

    ctx.fillStyle = '#78716c';
    ctx.font = `500 18px ${FONT}`;
    ctx.fillText(`ยอดเบิกรวมสุทธิ`, padding, fy + 8);

    ctx.fillStyle = '#0c4a3e';
    ctx.font = `700 24px ${FONT}`;
    const tot = `฿${fmt(summary.total)}`;
    const totW = ctx.measureText(tot).width;
    ctx.fillText(tot, W - padding - totW, fy + 10);

    canvases.push(canvas);
  }

  return canvases;
}


// ─── Modal ตัวอย่างรูป ──────────────────────────────────────────
// รับ items: array ของ { canvas, name, label }
// แสดงทุกรูปเรียงต่อกัน + ปุ่มดาวน์โหลดทีละไฟล์ + ดาวน์โหลดทั้งหมดในครั้งเดียว
function ImagePreviewModal({ items, onClose }) {
  const list = Array.isArray(items) ? items : [];
  const [urls, setUrls] = useState([]);
  const [downloadedAll, setDownloadedAll] = useState(false);

  useEffect(() => {
    if (list.length === 0) return;
    const generatedUrls = [];
    let pending = list.length;
    list.forEach((item, i) => {
      item.canvas.toBlob(blob => {
        if (blob) generatedUrls[i] = URL.createObjectURL(blob);
        pending--;
        if (pending === 0) setUrls([...generatedUrls]);
      }, 'image/png');
    });
    return () => {
      generatedUrls.forEach(u => u && URL.revokeObjectURL(u));
    };
    // eslint-disable-next-line
  }, [items]);

  const downloadOne = (idx) => {
    const item = list[idx];
    if (!item) return;
    item.canvas.toBlob(blob => {
      if (!blob) return;
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = item.name;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }, 'image/png');
  };

  const downloadAll = async () => {
    // ดาวน์โหลดทีละไฟล์ห่างกัน 300ms (browser บาง browser blocks ถ้าเร็วเกิน)
    for (let i = 0; i < list.length; i++) {
      downloadOne(i);
      await new Promise(r => setTimeout(r, 350));
    }
    setDownloadedAll(true);
    setTimeout(() => setDownloadedAll(false), 3000);
  };

  return (
    <div className="fixed inset-0 bg-black/70 z-50 flex items-end sm:items-center justify-center sm:p-3" onClick={onClose}>
      <div
        className="bg-white rounded-t-2xl sm:rounded-2xl p-4 max-w-md w-full max-h-[92vh] flex flex-col"
        style={{ paddingBottom: "calc(16px + env(safe-area-inset-bottom))" }}
        onClick={e => e.stopPropagation()}
      >
        <div className="flex items-center justify-between mb-3 flex-shrink-0">
          <div className="min-w-0">
            <h3 className="text-base font-semibold text-stone-900">รูปสรุปส่งพี่ X</h3>
            <p className="text-[11px] text-stone-500">
              {list.length === 1 ? "1 รูป" : `${list.length} รูป`} · บันทึกแล้วส่งทาง LINE ได้เลย
            </p>
          </div>
          <button onClick={onClose} className="w-9 h-9 grid place-items-center rounded-full hover:bg-stone-100 flex-shrink-0">
            <X size={18} />
          </button>
        </div>

        {/* รายการรูปทั้งหมด */}
        <div className="flex-1 overflow-y-auto bg-stone-100 rounded-xl p-3 mb-3 space-y-3">
          {list.length === 0 ? (
            <div className="text-stone-400 text-sm py-10 text-center">กำลังสร้างรูป...</div>
          ) : (
            list.map((item, i) => (
              <div key={i} className="bg-white rounded-lg p-2.5 shadow-sm">
                <div className="flex items-center justify-between mb-2">
                  <span className="text-[12px] font-semibold text-stone-700">{item.label}</span>
                  <button
                    onClick={() => downloadOne(i)}
                    disabled={!urls[i]}
                    className="text-[12px] px-2.5 py-1 rounded bg-stone-100 hover:bg-stone-200 disabled:opacity-50 text-stone-700 font-medium flex items-center gap-1"
                  >
                    <Download size={12} />บันทึก
                  </button>
                </div>
                {urls[i] ? (
                  <img src={urls[i]} alt={item.label} className="w-full rounded shadow-sm" />
                ) : (
                  <div className="text-stone-400 text-[11px] py-6 text-center">กำลังสร้าง...</div>
                )}
              </div>
            ))
          )}
        </div>

        {/* ปุ่มหลัก */}
        <button
          onClick={downloadAll}
          disabled={urls.length !== list.length || list.length === 0}
          className="w-full bg-emerald-700 hover:bg-emerald-800 disabled:bg-stone-300 text-white py-3.5 rounded-xl font-semibold text-[15px] flex items-center justify-center gap-2 min-h-[50px]"
        >
          {downloadedAll ? (
            <><Check size={18} />ดาวน์โหลดเรียบร้อย</>
          ) : (
            <><Download size={18} />ดาวน์โหลดทั้งหมด ({list.length} รูป)</>
          )}
        </button>
        <p className="text-[10.5px] text-stone-400 text-center mt-2">
          หรือกดค้างที่รูปแต่ละรูปเพื่อบันทึกลงเครื่อง
        </p>
      </div>
    </div>
  );
}



// ─── Modal ดูไฟล์แนบ ───────────────────────────────────────────
function AttachmentViewer({ attachments, onClose }) {
  const [selected, setSelected] = useState(0);
  const [dataUrls, setDataUrls] = useState({});
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    let cancelled = false;
    (async () => {
      const urls = {};
      await Promise.all(
        attachments.map(async (att) => {
          const v = await loadAttachment(att.id);
          if (v) urls[att.id] = v;
        })
      );
      if (!cancelled) {
        setDataUrls(urls);
        setLoading(false);
      }
    })();
    return () => { cancelled = true; };
  }, [attachments]);

  const att = attachments[selected];
  const url = att ? dataUrls[att.id] : null;
  const isPdf = att && att.type === 'application/pdf';

  const downloadCurrent = () => {
    if (!url) return;
    const a = document.createElement('a');
    a.href = url;
    a.download = att.name;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  };

  const next = () => setSelected(s => Math.min(s + 1, attachments.length - 1));
  const prev = () => setSelected(s => Math.max(s - 1, 0));

  return (
    <div className="fixed inset-0 bg-black/90 z-50 flex flex-col" onClick={onClose}>
      <div className="bg-stone-900 text-white px-4 py-3 pt-safe flex items-center gap-3 flex-shrink-0" onClick={e => e.stopPropagation()}>
        <button onClick={onClose} className="w-8 h-8 grid place-items-center rounded-full hover:bg-stone-800">
          <X size={18} />
        </button>
        <div className="flex-1 min-w-0">
          <p className="text-[13px] font-medium truncate">{att?.name || 'หลักฐาน'}</p>
          <p className="text-[10.5px] text-stone-400">
            {selected + 1} / {attachments.length} {att && `· ${isPdf ? 'PDF' : 'รูป'}`}
          </p>
        </div>
        {url && (
          <button onClick={downloadCurrent} className="w-8 h-8 grid place-items-center rounded-full hover:bg-stone-800">
            <Download size={16} />
          </button>
        )}
      </div>

      <div className="flex-1 overflow-auto flex items-center justify-center p-3" onClick={e => e.stopPropagation()}>
        {loading ? (
          <div className="text-stone-400 text-sm">กำลังโหลด...</div>
        ) : !url ? (
          <div className="text-stone-400 text-sm text-center">
            <AlertCircle size={28} className="mx-auto mb-2" />
            ไม่พบไฟล์แนบ — อาจถูกลบไปแล้ว
          </div>
        ) : isPdf ? (
          <iframe src={url} title={att.name} className="w-full h-full bg-white rounded" />
        ) : (
          <img src={url} alt={att.name} className="max-w-full max-h-full rounded shadow-2xl" />
        )}
      </div>

      {attachments.length > 1 && (
        <div className="bg-stone-900 px-3 py-2 flex items-center gap-2 flex-shrink-0" onClick={e => e.stopPropagation()}>
          <button onClick={prev} disabled={selected === 0}
            className="w-8 h-8 grid place-items-center rounded-full bg-stone-800 text-white disabled:opacity-30 hover:bg-stone-700">
            <ChevronLeft size={16} />
          </button>
          <div className="flex-1 flex gap-1.5 overflow-x-auto justify-center">
            {attachments.map((a, i) => (
              <button key={a.id} onClick={() => setSelected(i)}
                className={`px-2.5 py-1 rounded-md text-[11px] font-medium whitespace-nowrap ${
                  i === selected ? 'bg-white text-stone-900' : 'bg-stone-700 text-stone-200 hover:bg-stone-600'
                }`}>
                {i + 1}
              </button>
            ))}
          </div>
          <button onClick={next} disabled={selected === attachments.length - 1}
            className="w-8 h-8 grid place-items-center rounded-full bg-stone-800 text-white disabled:opacity-30 hover:bg-stone-700">
            <ChevronRight size={16} />
          </button>
        </div>
      )}
    </div>
  );
}

  </script>

  <script>
    const observer = new MutationObserver(() => {
      const root = document.getElementById('root');
      if (root && root.children.length > 0) {
        document.getElementById('loading')?.classList.add('gone');
        observer.disconnect();
      }
    });
    observer.observe(document.getElementById('root'), { childList: true });
    setTimeout(() => {
      document.getElementById('loading')?.classList.add('gone');
    }, 8000);
  </script>
